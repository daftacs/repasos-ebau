// ═══ CALENDAR ═══
function getWarnings(sid){
  const d=S.data[sid];if(!d)return[];const w=[];
  const byDate={};d.blocked.forEach(b=>{const p=b.lastIndexOf('-');const dt=b.substring(0,p);const hr=parseInt(b.substring(p+1));if(!byDate[dt])byDate[dt]=[];byDate[dt].push(hr)});
  Object.entries(byDate).forEach(([dt,hrs])=>{
    if(!isWeekend(dt))return;hrs.sort((a,b)=>a-b);
    let run=1,start=hrs[0];
    for(let i=1;i<hrs.length;i++){if(hrs[i]===hrs[i-1]+1)run++;else{if(run>=5)w.push({type:'weekend',date:dt,from:start,to:start+run,count:run});run=1;start=hrs[i]}}
    if(run>=5)w.push({type:'weekend',date:dt,from:start,to:start+run,count:run});
  });
  const fullDays=Object.values(byDate).filter(hrs=>hrs.length>=14).length;
  const totalBlocked=d.blocked.length;
  if(fullDays>=4||totalBlocked>=56)w.push({type:'toomany',total:totalBlocked,days:fullDays});
  return w;
}
function calH(sid,sub,d){
  const warns=getWarnings(sid);
  let h=`<div style="background:rgba(212,168,83,.06);border:1px solid rgba(212,168,83,.12);border-radius:12px;padding:12px;margin-bottom:12px"><p style="font-size:13px;color:var(--gold2);line-height:1.5;margin:0"><strong>Asumimos que puedes venir siempre.</strong> Toca un día y marca solo las horas que <strong>NO puedes</strong>.</p></div>`;
  warns.forEach(w=>{
    if(w.type==='weekend')h+=`<div class="warn-box yellow"><div><div style="font-size:13px;font-weight:700;color:var(--warn)">⚠️ ${fl(w.date)}: ${w.from}h-${w.to}h bloqueadas</div><div style="font-size:12px;color:var(--t2);margin-top:4px">¿Puedes explicarnos por qué?</div><input class="inp" placeholder="Explica brevemente..." oninput="W.setWNote('${sid}',this.value)" value="${esc(d.blockNote||'')}" style="margin-top:8px;padding:10px 12px;font-size:13px;border-color:var(--warn)"></div></div>`;
    if(w.type==='toomany')h+=`<div class="warn-box red"><div><div style="font-size:13px;font-weight:700;color:var(--red)">⚠️ Demasiadas restricciones</div><div style="font-size:12px;color:var(--t2);margin-top:4px">Tienes ${w.total} horas bloqueadas. Esto dificulta organizar tus repasos.</div><input class="inp" placeholder="¿Qué está pasando?" oninput="W.setWNote('${sid}',this.value)" value="${esc(d.blockNote||'')}" style="margin-top:8px;padding:10px 12px;font-size:13px;border-color:var(--red)"></div></div>`;
  });
  if(S.subs.length>1)h+=`<button onclick="W.cpBl('${sid}')" style="padding:6px 10px;border-radius:8px;border:1px solid var(--brd);background:var(--card);color:var(--t2);font-size:11px;cursor:pointer;font-family:inherit;margin-bottom:10px">📋 Copiar a demás asignaturas</button>`;
  [{l:'Abril 2026',m:3},{l:'Mayo 2026',m:4}].forEach(({l,m})=>{
    const mD=DT.filter(dt=>dt.startsWith('2026-'+String(m+1).padStart(2,'0')));
    const av=new Set(mD.map(dt=>new Date(dt+'T12:00:00').getDate()));
    const off=((new Date(2026,m,1).getDay()||7)-1),dim=new Date(2026,m+1,0).getDate();
    h+=`<div style="margin-bottom:16px"><div style="font-size:13px;font-weight:700;color:${sub.a};margin-bottom:8px;text-align:center">${l}</div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">${['L','M','X','J','V','S','D'].map(n=>`<div style="text-align:center;font-size:10px;color:var(--t3);font-weight:600">${n}</div>`).join('')}</div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">`;
    for(let i=0;i<off;i++)h+=`<div></div>`;
    for(let day=1;day<=dim;day++){
      const ia=av.has(day);const ds=mD.find(dt=>new Date(dt+'T12:00:00').getDate()===day);
      const bc=ds?d.blocked.filter(b=>b.startsWith(ds+'-')).length:0;const op=S.openDay[sid]===ds;
      h+=ia?`<div class="cal-day${bc?' blk':''}${op?' opn':''}" onclick="W.togDay('${sid}','${ds}')">${day}${bc?`<span style="font-size:7px;position:absolute;bottom:1px">${bc}🚫</span>`:''}</div>`:`<div class="cal-day off">${day}</div>`;
    }
    h+=`</div>`;
    const od=S.openDay[sid];
    if(od&&mD.includes(od)){
      h+=`<div id="day-panel" style="margin-top:8px;background:var(--card);border-radius:12px;padding:14px;border:1px solid ${sub.a}30">
<div style="font-weight:700;font-size:14px;color:${sub.a};margin-bottom:8px">📅 ${fl(od)}</div>
<p style="font-size:12px;color:var(--t3);margin-bottom:8px">Toca las horas en las que <span style="color:var(--red);font-weight:700">NO puedes</span>:</p>
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
${HR.map(hr=>`<button class="hb${d.blocked.includes(od+'-'+hr)?' on':''}" onclick="W.togHr('${sid}','${od}',${hr})">${hr}h</button>`).join('')}</div>
${d.blocked.filter(b=>b.startsWith(od+'-')).length?`<div style="margin-top:8px;font-size:12px;color:var(--red)">${d.blocked.filter(b=>b.startsWith(od+'-')).length} hora/s bloqueada/s</div>`:`<div style="margin-top:8px;font-size:12px;color:var(--grn)">✅ Disponible todo el día</div>`}</div>`;
    }
    h+=`</div>`;
  });
  if(d.blocked.length){
    h+=`<div style="background:var(--card);border-radius:10px;padding:10px;border:1px solid var(--brd)">
<div style="font-size:10px;font-weight:700;color:var(--red);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">${d.blocked.length} franja/s bloqueada/s</div>
${d.blocked.sort().map(b=>{const p=b.split('-');return`<span style="display:inline-block;font-size:10px;color:var(--t2);background:var(--card2);padding:2px 6px;border-radius:4px;margin:1px">🚫 ${parseInt(p[2])}/${parseInt(p[1])} ${p[3]}h</span>`}).join('')}</div>`;
  }
  return h;
}

function renderSP(){
  const el=document.getElementById('sd-pv');if(!el||!ASTU)return;
  const st=AD.alumnos.find(a=>a.id===ASTU);if(!st){el.innerHTML='';return}
  const sc=AD.clases.filter(c=>(c.inscripciones||[]).some(i=>i.alumno_id===ASTU)).sort((a,b)=>a.fecha<b.fecha?-1:a.fecha>b.fecha?1:a.hora_inicio-b.hora_inicio);
  if(!sc.length){el.innerHTML=`<div style="color:var(--t3);font-size:12px;text-align:center;padding:12px">Sin clases asignadas aún</div>`;return}
  let total=0;
  let m=`🎓 *REPASOS EBAU - Coco Sapiens*\n\nHola ${st.nombre}, tus clases:\n`;
  const bs={};sc.forEach(c=>{const s=SJ.find(x=>x.id===c.asignatura_id);if(!bs[s?.n||c.asignatura_id])bs[s?.n||c.asignatura_id]=[];bs[s?.n||c.asignatura_id].push(c)});
  Object.entries(bs).forEach(([n,cls])=>{
    m+=`\n📚 *${n}*\n`;
    cls.forEach(c=>{
      const insc=c.inscripciones||[];const nStu=insc.length;
      const rate=st.es_externo?tarifaExt(nStu):tarifa(nStu);
      const dur=c.duracion_horas||2;const cost=Math.round(rate*dur*100)/100;total+=cost;
      m+=`  📅 ${fl(c.fecha)} · ${c.hora_inicio}:00 · ${fmtDur(dur)}\n     ${c.tema} (${nStu} alum. → ${rate}€/h)\n     Importe: ${cost}€\n`;
    });
  });
  m+=`\n━━━━━━━━━━━━━━━━━━━━\n💰 *TOTAL: ${total}€*\n\n⚠️ Horarios firmes. ¿Confirmas? *SÍ* 🙏`;
  el.innerHTML=`<div style="background:var(--card);border-radius:10px;padding:10px;border:1px solid var(--brd);margin-bottom:8px;max-height:260px;overflow-y:auto">
<pre style="white-space:pre-wrap;font-size:11px;line-height:1.5;font-family:inherit;color:var(--t2);margin:0">${esc(m)}</pre></div>
<button class="btn" style="margin-bottom:6px" onclick="copyMsg(${JSON.stringify(m).replace(/</g,'\\u003c')})">📋 COPIAR</button>
<button class="btn btn-w" onclick="shareMsg(${JSON.stringify(m).replace(/</g,'\\u003c')})">💬 COMPARTIR</button>`;
}
function copyMsg(m){navigator.clipboard.writeText(m).then(()=>toast('¡Copiado!',true)).catch(()=>{const t=document.createElement('textarea');t.value=m;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();toast('¡Copiado!',true)})}
function shareMsg(m){if(navigator.share)navigator.share({text:m}).catch(()=>{});else copyMsg(m)}

  if(error){toast('Error: '+error.message);return}
  data.inscripciones=[];

  AD.clases=AD.clases.filter(c=>c.id!==id);R();toast('Clase eliminada');
};
W.togCS=async function(cid,aid){
  const c=AD.clases.find(x=>x.id===cid);if(!c)return;
  if(!c.inscripciones)c.inscripciones=[];
  const idx=c.inscripciones.findIndex(i=>i.alumno_id===aid);
  if(idx>=0){
    await db.from('inscripciones').delete().eq('clase_id',cid).eq('alumno_id',aid);
    c.inscripciones.splice(idx,1);
  } else {
    const rm=RM.find(r=>r.id===c.aula);
    if(c.inscripciones.length>=(rm?.c||8)){toast('Clase llena');return}
    const a=AD.alumnos.find(x=>x.id===aid);
    const nStu=c.inscripciones.length+1;
    const ph=a?.es_externo?tarifaExt(nStu):tarifa(nStu);
    const pt=Math.round(ph*(c.duracion_horas||2)*100)/100;
    const {data}=await db.from('inscripciones').insert({clase_id:cid,alumno_id:aid,precio_hora:ph,precio_total:pt}).select().single();
    if(data)c.inscripciones.push(data);
  }
  // Recalculate prices for all in this class
  const nNew=c.inscripciones.length;
  for(const insc of c.inscripciones){
    const a=AD.alumnos.find(x=>x.id===insc.alumno_id);
    const ph=a?.es_externo?tarifaExt(nNew):tarifa(nNew);
    const pt=Math.round(ph*(c.duracion_horas||2)*100)/100;
    if(insc.precio_hora!==ph){
      await db.from('inscripciones').update({precio_hora:ph,precio_total:pt}).eq('id',insc.id);
      insc.precio_hora=ph;insc.precio_total=pt;
    }
  }
  R();
};
W.autoOrg=async function(){
  const stu=AD.alumnos;if(!stu.length){toast('No hay alumnos');return}
  showOv(true,'Organizando clases...');
  // Delete existing empty classes
  const toKeep=AD.clases.filter(c=>(c.inscripciones||[]).length>0);
  const toDel=AD.clases.filter(c=>!(c.inscripciones||[]).length);
  for(const c of toDel)await db.from('clases').delete().eq('id',c.id);
  let res=[...toKeep];
  // Sort students: academy first, then external
  const sorted=[...stu].sort((a,b)=>(a.es_externo?1:0)-(b.es_externo?1:0));
  for(const sub of SJ){
    const subStu=sorted.filter(s=>(s.peticiones||[]).some(p=>p.asignatura_id===sub.id));
    if(!subStu.length)continue;
    // Build demand map per topic
    const dem={};
    subStu.forEach(s=>{
      const ped=s.peticiones.find(p=>p.asignatura_id===sub.id);
      if(!ped)return;
      (ped.temas||[]).forEach(t=>{
        if(!dem[t.name])dem[t.name]={pr:0,urg:0,sts:[],stuMap:{}};
        dem[t.name].urg+=(t.urgent?1:0);dem[t.name].pr+=t.priority;
        dem[t.name].sts.push(s.id);dem[t.name].stuMap[s.id]=ped;
      });
    });
    const topicsSorted=Object.entries(dem).sort((a,b)=>b[1].urg!==a[1].urg?b[1].urg-a[1].urg:(a[1].pr/a[1].sts.length)-(b[1].pr/b[1].sts.length));
    for(const [topic,info] of topicsSorted){
      if(res.some(c=>c.asignatura_id===sub.id&&c.tema===topic))continue;
      let best=null,bestN=0;
      for(const dt of DT){
        for(const hr of HR){
          // Check teacher not double booked
          if(res.some(c=>c.fecha===dt&&c.hora_inicio===hr&&SJ.find(s=>s.id===c.asignatura_id)?.t===sub.t))continue;
          // Find available students
          const av=info.sts.filter(sid=>{
            const ped=info.stuMap[sid];
            if((ped.horas_bloqueadas||[]).includes(dt+'-'+hr))return false;
            // Check student not in another class at same time
            if(res.some(c=>c.fecha===dt&&c.hora_inicio===hr&&(c.inscripciones||[]).some(i=>i.alumno_id===sid)))return false;
            // Spread preference: penalize if student has class same day
            const s=sorted.find(x=>x.id===sid);
            if(s&&!s.prefiere_concentrar){
              const sameDay=res.filter(c=>c.fecha===dt&&(c.inscripciones||[]).some(i=>i.alumno_id===sid)).length;
              if(sameDay>=2)return false;
            }
            return true;
          });
          if(av.length>bestN){bestN=av.length;best={dt,hr,sts:av}}
        }
      }
      if(best&&bestN>0){
        const usedRooms=res.filter(c=>c.fecha===best.dt&&c.hora_inicio===best.hr).map(c=>c.aula);
        const rm=RM.find(r=>!usedRooms.includes(r.id));
        if(rm){
          const tInfo=(TP[sub.id]||[]).find(t=>t.name===topic);
          const {data:cls}=await db.from('clases').insert({asignatura_id:sub.id,tema:topic,duracion_horas:tInfo?.dur||2,descanso_min:tInfo?.brk||0,fecha:best.dt,hora_inicio:best.hr,aula:rm.id}).select().single();
          if(!cls)continue;
          cls.inscripciones=[];
          const stuToAdd=best.sts.slice(0,rm.c);
          const nStu=stuToAdd.length;
          for(const sid of stuToAdd){
            const a=sorted.find(x=>x.id===sid);
            const ph=a?.es_externo?tarifaExt(nStu):tarifa(nStu);
            const pt=Math.round(ph*(tInfo?.dur||2)*100)/100;
            const {data:insc}=await db.from('inscripciones').insert({clase_id:cls.id,alumno_id:sid,precio_hora:ph,precio_total:pt}).select().single();
            if(insc)cls.inscripciones.push(insc);
          }
          res.push(cls);
        }
      }
    }
  }
  AD.clases=res;showOv(false);toast('✅ '+res.length+' clases organizadas',true);R();
};

  // Registro datos
  document.getElementById('r-nombre')?.addEventListener('input',function(){REG.nombre=this.value;document.getElementById('next').disabled=!(REG.nombre.trim()&&REG.apellidos.trim()&&REG.centro.trim())});

  document.querySelectorAll('input[name="tipo"]').forEach(r=>r.addEventListener('change',function(){REG.esExterno=this.value==='externo';document.querySelectorAll('.radio-card').forEach(c=>c.classList.remove('sel'));this.closest('.radio-card')?.classList.add('sel')}));
  document.querySelectorAll('input[name="pref"]').forEach(r=>r.addEventListener('change',function(){REG.prefConcentrar=this.value==='concentradas';this.closest('.radio-card')?.classList.add('sel')}));

  // PIN handler (registro)
  if(V==='reg'&&(REG.step==='pin'||REG.step==='pin2')){
    document.querySelectorAll('.pin-key[data-n]').forEach(k=>k.addEventListener('click',()=>{
      const isConf=REG.step==='pin2';
      const buf=isConf?REG.pinBuf2:REG.pinBuf;
      if(buf.length>=4)return;
      const newBuf=buf+k.dataset.n;
      if(isConf)REG.pinBuf2=newBuf;else REG.pinBuf=newBuf;
      document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',newBuf.length>i));
      if(newBuf.length===4){
        if(!isConf){REG.step='pin2';setTimeout(()=>R(),200)}
        else{
          if(REG.pinBuf===REG.pinBuf2){REG.pin=REG.pinBuf;startWizard()}
          else{document.getElementById('pin-err').textContent='Los PINs no coinciden. Inténtalo de nuevo.';REG.pinBuf='';REG.pinBuf2='';REG.step='pin';setTimeout(()=>R(),1200)}
        }
      }
    }));
    document.getElementById('pin-del')?.addEventListener('click',()=>{
      const isConf=REG.step==='pin2';
      if(isConf)REG.pinBuf2=REG.pinBuf2.slice(0,-1);else REG.pinBuf=REG.pinBuf.slice(0,-1);
      const buf=isConf?REG.pinBuf2:REG.pinBuf;
      document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',buf.length>i));
    });
  }

  // Login PIN
  if(V==='login-pin'){
    document.querySelectorAll('.pin-key[data-n]').forEach(k=>k.addEventListener('click',()=>{
      if(LG.pinBuf.length>=4)return;
      LG.pinBuf+=k.dataset.n;
      document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<LG.pinBuf.length));
      if(LG.pinBuf.length===4)doLogin();
    }));
    document.getElementById('pin-del')?.addEventListener('click',()=>{LG.pinBuf=LG.pinBuf.slice(0,-1);document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<LG.pinBuf.length))});
  }

  // Back universal
  document.getElementById('back')?.addEventListener('click',()=>{
    if(V==='reg'){
      if(REG.step==='datos')go('splash');
      else if(REG.step==='config'){REG.step='datos';R()}
      else if(REG.step==='pin'){REG.step='config';R()}
      else if(REG.step==='pin2'){REG.step='pin';REG.pinBuf='';REG.pinBuf2='';R()}
    } else if(V==='wizard'){
      if(S.step===0)go('splash');
      else{S.step--;R();window.scrollTo(0,0)}
    } else if(V==='fin'){S.step=S.subs.length;go('wizard')}
    else if(V==='login')go('splash');
    else if(V==='login-pin')go('login');
    else go('splash');
  });

  // Next button
  document.getElementById('next')?.addEventListener('click',()=>{
    if(V==='reg'){
      if(REG.step==='datos'){REG.step='config';R();window.scrollTo(0,0)}
      else if(REG.step==='config'){REG.step='pin';REG.pinBuf='';R();window.scrollTo(0,0)}
    } else if(V==='login'){go('login-pin')}
    else if(V==='wizard'){
      if(S.step===0+S.subs.length){genMsg();S.step=999;R();window.scrollTo(0,0)}
      else{S.step++;R();window.scrollTo(0,0)}
    }
  });

  // Login fields
  document.getElementById('l-nombre')?.addEventListener('input',function(){LG.nombre=this.value;document.getElementById('next').disabled=!(LG.nombre.trim()&&LG.apellidos.trim())});
  document.getElementById('l-apellidos')?.addEventListener('input',function(){LG.apellidos=this.value;document.getElementById('next').disabled=!(LG.nombre.trim()&&LG.apellidos.trim())});

  // Student home
  document.getElementById('btn-logout')?.addEventListener('click',()=>{ALUMNO=null;ALUMNO_CLASES=[];go('splash')});
  document.getElementById('btn-edit')?.addEventListener('click',()=>{editarPeticion()});

  // Fin wizard
  const acc=document.getElementById('chk-acc');const abox=document.getElementById('acc-box');
  if(acc){
    function uA(){S.accepted=acc.checked;document.getElementById('btn-save').disabled=!S.accepted;document.getElementById('btn-share').disabled=!S.accepted}
    abox?.addEventListener('click',e=>{if(e.target!==acc)acc.checked=!acc.checked;uA()});
    acc.addEventListener('change',uA);
  }
  document.getElementById('btn-save')?.addEventListener('click',saveToSupabase);
  document.getElementById('btn-share')?.addEventListener('click',()=>{if(navigator.share)navigator.share({text:S.msg}).catch(()=>{});else copyMsg(S.msg)});

  // Admin login
  document.getElementById('adm-enter')?.addEventListener('click',doAdminLogin);
  document.getElementById('adm-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin()});
  document.getElementById('adm-back')?.addEventListener('click',()=>{ADMIN=false;AD={alumnos:[],clases:[],config:{}};go('splash')});

  // Admin tabs
  document.querySelectorAll('[data-at]').forEach(t=>t.addEventListener('click',()=>{AT=t.dataset.at;AEXP={};R()}));

  // Admin search
  document.getElementById('s-search')?.addEventListener('input',function(){ASRCH=this.value;R()});

  // Admin new class
  document.getElementById('nc-sub')?.addEventListener('change',function(){ANC.sid=this.value;ANC.topic='';R()});
  document.getElementById('nc-top')?.addEventListener('change',function(){ANC.topic=this.value});
  document.getElementById('nc-dt')?.addEventListener('change',function(){ANC.date=this.value});
  document.getElementById('nc-hr')?.addEventListener('change',function(){ANC.hour=parseInt(this.value)});
  document.getElementById('nc-rm')?.addEventListener('change',function(){ANC.room=this.value});

  // Admin send
  document.getElementById('sd-stu')?.addEventListener('change',function(){ASTU=this.value;renderSP()});
  if(ASTU&&V==='admin'&&AT==='enviar')setTimeout(renderSP,50);

  // Wizard: subjects
  document.querySelectorAll('.sjc').forEach(c=>c.addEventListener('click',()=>{
    const id=c.dataset.id;
    if(S.subs.includes(id)){S.subs=S.subs.filter(s=>s!==id);delete S.data[id]}
    else{S.subs.push(id);S.data[id]={ebau:true,finalDate:'',estimated:false,weekHint:'',topics:[],blocked:[],blockNote:''};S.tabs[id]='topics';S.openDay[id]=null}
    R();
  }));
  // Wizard: subject detail
  const sid=S.subs[S.step-1];
  if(sid&&S.data[sid]){
    document.getElementById('ebau-tog')?.addEventListener('click',()=>{S.data[sid].ebau=!S.data[sid].ebau;R()});
    document.getElementById('i-final')?.addEventListener('change',function(){S.data[sid].finalDate=this.value;document.getElementById('next').disabled=!(S.data[sid].topics.length&&S.data[sid].finalDate)});
    document.getElementById('chk-est')?.addEventListener('change',function(){S.data[sid].estimated=this.checked;R()});
    document.getElementById('i-week')?.addEventListener('input',function(){S.data[sid].weekHint=this.value});
    document.querySelectorAll('.tab[data-tab]').forEach(t=>t.addEventListener('click',()=>{S.tabs[sid]=t.dataset.tab;R()}));
  }
}

// ═══ WIZARD LOGIC ═══
function startWizard(){
  S={step:0,subs:[],data:{},tabs:{},openDay:{},accepted:false,msg:''};
  go('wizard');
}

function genMsg(){
  let m=`🎓 REPASOS EBAU · COCO SAPIENS\n━━━━━━━━━━━━━━━━━━━━\n👤 ${REG.nombre} ${REG.apellidos}\n`;
  if(REG.telefono)m+=`📱 ${REG.telefono}\n`;
  m+=`🏫 ${REG.centro}\n`;
  m+=`🎓 ${REG.esExterno?'Alumno externo':'Alumno del curso'}\n`;
  m+=`📋 Preferencia: ${REG.prefConcentrar?'Clases concentradas':'Clases repartidas'}\n`;
  S.subs.forEach(sid=>{
    const sub=SJ.find(s=>s.id===sid);const d=S.data[sid];
    m+=`\n📚 ${sub.n.toUpperCase()}\n🎯 EBAU: ${d.ebau?'SÍ':'NO'}\n`;
    const f=d.finalDate?new Date(d.finalDate+'T12:00:00'):null;
    m+=`📅 Final: ${f?f.getDate()+'/'+(f.getMonth()+1)+'/'+f.getFullYear():'??'}${d.estimated?' (estimada)'+(d.weekHint?' → '+d.weekHint:''):''}\n📋 Temas:\n`;
    d.topics.forEach((t,i)=>{const info=(TP[sid]||[]).find(x=>x.name===t.name);m+=`  ${i+1}. ${t.name}${info?' ('+fmtDur(info.dur)+')':''}${t.urgent?' 🔥':''}\n`});
    if(d.blocked.length){
      m+=`🚫 No puedo:\n`;
      const byDate={};d.blocked.forEach(b=>{const p=b.lastIndexOf('-');const dt=b.substring(0,p);const hr=parseInt(b.substring(p+1));if(!byDate[dt])byDate[dt]=[];byDate[dt].push(hr)});
      Object.keys(byDate).sort().forEach(k=>{const hrs=byDate[k].sort((a,b)=>a-b);const groups=[];let start=hrs[0],prev=hrs[0];for(let i=1;i<hrs.length;i++){if(hrs[i]===prev+1)prev=hrs[i];else{groups.push([start,prev+1]);start=hrs[i];prev=hrs[i]}}groups.push([start,prev+1]);groups.forEach(([s,e])=>{m+=`  ${fd(k)} ${s}:00-${e}:00\n`})});
      if(d.blockNote)m+=`  📝 ${d.blockNote}\n`;
    } else m+=`✅ Disponibilidad total\n`;
  });
  m+=`\n✅ ACEPTO las condiciones\n━━━━━━━━━━━━━━━━━━━━`;
  S.msg=m;
}

async function saveToSupabase(){
  showOv(true,'Guardando tu petición...');
  try{
    // Check if alumno already exists
    const {data:existing}=await db.from('alumnos').select('id').eq('nombre',REG.nombre).eq('apellidos',REG.apellidos).maybeSingle();
    let alumnoId;
    if(existing){
      alumnoId=existing.id;
      await db.from('alumnos').update({telefono:REG.telefono,centro:REG.centro,es_externo:REG.esExterno,prefiere_concentrar:REG.prefConcentrar,pin:REG.pin}).eq('id',alumnoId);
    } else {
      const {data:newA,error:errA}=await db.from('alumnos').insert({nombre:REG.nombre,apellidos:REG.apellidos,telefono:REG.telefono,centro:REG.centro,es_externo:REG.esExterno,prefiere_concentrar:REG.prefConcentrar,pin:REG.pin}).select().single();
      if(errA)throw errA;
      alumnoId=newA.id;
    }
    // Delete old peticiones and insert new
    await db.from('peticiones').delete().eq('alumno_id',alumnoId);
    for(const sid of S.subs){
      const d=S.data[sid];
      await db.from('peticiones').insert({alumno_id:alumnoId,asignatura_id:sid,temas:d.topics,horas_bloqueadas:d.blocked,fecha_examen:d.finalDate||null,es_ebau:d.ebau,fecha_estimada:d.estimated,semana_hint:d.weekHint||null,nota_bloqueo:d.blockNote||null});
    }
    showOv(false);
    toast('✅ Petición guardada',true);
  } catch(e){
    showOv(false);
    toast('Error al guardar: '+e.message);
  }
}

function editarPeticion(){
  // Reload wizard with existing data
  S={step:0,subs:[],data:{},tabs:{},openDay:{},accepted:false,msg:''};
  const peds=ALUMNO.peticiones||[];
  peds.forEach(p=>{
    S.subs.push(p.asignatura_id);
    S.data[p.asignatura_id]={ebau:p.es_ebau,finalDate:p.fecha_examen||'',estimated:p.fecha_estimada,weekHint:p.semana_hint||'',topics:p.temas||[],blocked:p.horas_bloqueadas||[],blockNote:p.nota_bloqueo||''};
    S.tabs[p.asignatura_id]='topics';S.openDay[p.asignatura_id]=null;
  });
  REG.nombre=ALUMNO.nombre;REG.apellidos=ALUMNO.apellidos;REG.telefono=ALUMNO.telefono||'';REG.centro=ALUMNO.centro||'';REG.esExterno=ALUMNO.es_externo;REG.prefConcentrar=ALUMNO.prefiere_concentrar;REG.pin=ALUMNO.pin;
  go('wizard');
}

async function doLogin(){

}

async function loadAdminData(){
  const [r1,r2,r3]=await Promise.all([
    db.from('alumnos').select('*, peticiones(*)').order('apellidos'),
    db.from('clases').select('*, inscripciones(*)').order('fecha').order('hora_inicio'),
    db.from('config').select('*')
  ]);
  AD.alumnos=r1.data||[];
  AD.clases=r2.data||[];
  AD.config={};(r3.data||[]).forEach(c=>AD.config[c.clave]=c.valor);
}
