// ═══ CALENDAR ═══
function getWarnings(sid){
  const d=S.data[sid];if(!d)return[];const w=[];
  const byDate={};d.blocked.forEach(b=>{const p=b.lastIndexOf('-');const dt=b.substring(0,p);const hr=parseInt(b.substring(p+1));if(!byDate[dt])byDate[dt]=[];byDate[dt].push(hr)});
  Object.entries(byDate).forEach(([dt,hrs])=>{
    if(!isWeekend(dt))return;hrs.sort((a,b)=>a-b);
    let run=1,start=hrs[0];
    for(let i=1;i<hrs.length;i++){if(hrs[i]===hrs[i-1]+1)run++;else{if(run>=5)w.push({type:'weekend',date:dt,from:start,to:start+run,count:run});run=1;start=hrs[i]}}
    if(run>=5)w.push({type:'weekend',date:dt,from:start,to:start+run,count:run});
  });
  const fullDays=Object.values(byDate).filter(hrs=>hrs.length>=14).length;
  const totalBlocked=d.blocked.length;
  if(fullDays>=4||totalBlocked>=56)w.push({type:'toomany',total:totalBlocked,days:fullDays});
  return w;
}

    if(w.type==='toomany')h+=`<div class="warn-box red"><div><div style="font-size:13px;font-weight:700;color:var(--red)">⚠️ Demasiadas restricciones</div><div style="font-size:12px;color:var(--t2);margin-top:4px">Tienes ${w.total} horas bloqueadas. Esto dificulta organizar tus repasos.</div><input class="inp" placeholder="¿Qué está pasando?" oninput="W.setWNote('${sid}',this.value)" value="${esc(d.blockNote||'')}" style="margin-top:8px;padding:10px 12px;font-size:13px;border-color:var(--red)"></div></div>`;
  });
  if(S.subs.length>1)h+=`<button onclick="W.cpBl('${sid}')" style="padding:6px 10px;border-radius:8px;border:1px solid var(--brd);background:var(--card);color:var(--t2);font-size:11px;cursor:pointer;font-family:inherit;margin-bottom:10px">📋 Copiar a demás asignaturas</button>`;
  [{l:'Abril 2026',m:3},{l:'Mayo 2026',m:4}].forEach(({l,m})=>{
    const mD=DT.filter(dt=>dt.startsWith('2026-'+String(m+1).padStart(2,'0')));
    const av=new Set(mD.map(dt=>new Date(dt+'T12:00:00').getDate()));
    const off=((new Date(2026,m,1).getDay()||7)-1),dim=new Date(2026,m+1,0).getDate();
    h+=`<div style="margin-bottom:16px"><div style="font-size:13px;font-weight:700;color:${sub.a};margin-bottom:8px;text-align:center">${l}</div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">${['L','M','X','J','V','S','D'].map(n=>`<div style="text-align:center;font-size:10px;color:var(--t3);font-weight:600">${n}</div>`).join('')}</div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">`;
    for(let i=0;i<off;i++)h+=`<div></div>`;
    for(let day=1;day<=dim;day++){
      const ia=av.has(day);const ds=mD.find(dt=>new Date(dt+'T12:00:00').getDate()===day);
      const bc=ds?d.blocked.filter(b=>b.startsWith(ds+'-')).length:0;const op=S.openDay[sid]===ds;
      h+=ia?`<div class="cal-day${bc?' blk':''}${op?' opn':''}" onclick="W.togDay('${sid}','${ds}')">${day}${bc?`<span style="font-size:7px;position:absolute;bottom:1px">${bc}🚫</span>`:''}</div>`:`<div class="cal-day off">${day}</div>`;
    }
    h+=`</div>`;
    const od=S.openDay[sid];
    if(od&&mD.includes(od)){
      h+=`<div id="day-panel" style="margin-top:8px;background:var(--card);border-radius:12px;padding:14px;border:1px solid ${sub.a}30">
<div style="font-weight:700;font-size:14px;color:${sub.a};margin-bottom:8px">📅 ${fl(od)}</div>
<p style="font-size:12px;color:var(--t3);margin-bottom:8px">Toca las horas en las que <span style="color:var(--red);font-weight:700">NO puedes</span>:</p>
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
${HR.map(hr=>`<button class="hb${d.blocked.includes(od+'-'+hr)?' on':''}" onclick="W.togHr('${sid}','${od}',${hr})">${hr}h</button>`).join('')}</div>

    }
    h+=`</div>`;

function stuClasesH(){
  const claseCard=(c,sub)=>{
    const tInfo=(TP[c.asignatura_id]||[]).find(t=>t.name===c.tema);
    const dur=parseFloat(c.duracion_horas||tInfo?.dur||2);
    const brk=parseInt(c.descanso_min||tInfo?.brk||0);
    const s=sub||SJ.find(x=>x.id===c.asignatura_id);
    return`<div style="padding:10px;border-radius:10px;background:var(--card2);margin-bottom:6px;border-left:3px solid ${s?.a||'var(--brd)'}">
<div style="font-weight:600;font-size:13px">${c.tema}</div>
<div style="font-size:12px;color:var(--t2);margin-top:3px">${fl(c.fecha)} · ${fmtHoraMin(c.hora_inicio)}–${endTime(c.hora_inicio,dur,brk)}${brk?` <span style="font-size:10px;color:var(--t3)">(inc. ${brk}' descanso)</span>`:''}</div>
${STU_VIEW==='chrono'?`<div style="font-size:10px;color:${s?.a||'var(--t3)'};margin-top:2px;font-weight:600">${s?.e||''} ${s?.n||''}</div>`:''}
</div>`;
  };
  let h='';
  if(STU_VIEW==='subj'){
    const bySubj={};
    ALUMNO_CLASES.forEach(c=>{if(!bySubj[c.asignatura_id])bySubj[c.asignatura_id]=[];bySubj[c.asignatura_id].push(c)});
    Object.entries(bySubj).forEach(([sid,cls])=>{
      const s=SJ.find(x=>x.id===sid);if(!s)return;
      h+=`<div style="margin-bottom:10px"><div style="font-weight:700;color:${s.a};font-size:13px;margin-bottom:6px">${s.e} ${s.n}</div>`;
      cls.sort((a,b)=>a.fecha<b.fecha?-1:a.fecha>b.fecha?1:a.hora_inicio-b.hora_inicio).forEach(c=>{h+=claseCard(c,s)});
      h+=`</div>`;
    });
  } else {
    const sorted=[...ALUMNO_CLASES].sort((a,b)=>a.fecha<b.fecha?-1:a.fecha>b.fecha?1:a.hora_inicio-b.hora_inicio);
    sorted.forEach(c=>{h+=claseCard(c,null)});
  }
  h+=`<div style="border-top:1px solid var(--brd);padding-top:8px;text-align:center;font-size:11px;color:var(--t3);margin-top:4px">${ALUMNO_CLASES.length} clase${ALUMNO_CLASES.length!==1?'s':''} asignada${ALUMNO_CLASES.length!==1?'s':''}</div>`;
  return h;
}

<button onclick="W.movPetT('${a.id}','${p.asignatura_id}',${i},-1)" style="background:none;border:1px solid var(--brd);color:var(--t3);cursor:pointer;font-size:9px;padding:1px 4px;border-radius:3px" ${i===0?'disabled':''}>▲</button>

<button onclick="W.togPetUrg('${a.id}','${p.asignatura_id}','${esc2(t.name)}')" style="background:none;border:1px solid ${t.urgent?'rgba(239,68,68,.3)':'var(--brd)'};color:${t.urgent?'var(--red)':'var(--t3)'};cursor:pointer;font-size:9px;padding:1px 4px;border-radius:3px">🔥</button>

function freeSlotBlock(startH,endH){
  const dMin=Math.round((endH-startH)*60);
  return`<div style="padding:3px 7px;border-radius:5px;border:1px dashed rgba(212,168,83,.2);font-size:9px;color:var(--t3);margin-bottom:2px;display:flex;justify-content:space-between;background:rgba(212,168,83,.03)"><span>${fmtHoraMin(startH)}–${fmtHoraMin(endH)}</span><span>libre ${dMin}min</span></div>`;
}
function tetrisTimeline(clases,teacher,sessions){
  const TRANS=5;
  let h='';
  sessions.forEach(sess=>{
    const sc=clases.filter(c=>{const m=c.hora_inicio*60;return m>=sess.start&&m<sess.end}).sort((a,b)=>a.hora_inicio-b.hora_inicio);
    h+=`<div style="font-size:9px;color:var(--t3);margin:4px 0 2px;text-transform:uppercase;letter-spacing:1px">${sess.id==='morning'?'☀️ Mañana':'🌙 Tarde'} ${fmtHoraMin(sess.start/60)}–${fmtHoraMin(sess.end/60)}</div>`;
    sc.forEach((c,i)=>{
      h+=tetrisBlock(c,sessions);
      const cEnd=c.hora_inicio*60+clsDurMin(c.duracion_horas,c.descanso_min)+TRANS;
      const nextS=i<sc.length-1?sc[i+1].hora_inicio*60:null;
      if(nextS&&cEnd<nextS)h+=freeSlotBlock(cEnd/60,nextS/60);
    });
    for(let i=sc.length;i<3;i++)h+=`<div style="padding:4px 8px;border-radius:5px;border:1px dashed rgba(212,168,83,.12);font-size:9px;color:var(--t3);margin-bottom:2px;text-align:center;opacity:.6">— Clase ${i+1} libre —</div>`;
  });
  if(!h)h='<div style="text-align:center;padding:8px;color:var(--t3);font-size:9px">Sin sesiones este día</div>';
  return h;
}
function admHorarios(){
  const weeks={};DT.forEach(dt=>{const d=new Date(dt+'T12:00:00');const wk=getWeekNum(d);if(!weeks[wk])weeks[wk]=[];weeks[wk].push(dt)});
  const NC=`<div id="nc" style="display:${ANEW?'block':'none'};background:var(--card);border-radius:10px;padding:10px;margin-bottom:10px;border:1px solid rgba(212,168,83,.2)"><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px"><select class="inp" id="nc-sub" style="flex:1;min-width:80px;font-size:12px">${SJ.map(s=>`<option value="${s.id}" ${ANC.sid===s.id?'selected':''}>${s.e} ${s.n}</option>`).join('')}</select><select class="inp" id="nc-top" style="flex:2;min-width:120px;font-size:12px"><option value="">Tema...</option>${(TP[ANC.sid]||[]).map(t=>`<option value="${t.name}" ${ANC.topic===t.name?'selected':''}>${t.name} (${fmtDur(t.dur)})</option>`).join('')}</select></div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px"><select class="inp" id="nc-dt" style="flex:1;font-size:12px"><option value="">Fecha...</option>${DT.map(d=>`<option value="${d}" ${ANC.date===d?'selected':''}>${fl(d)}</option>`).join('')}</select><input type="time" class="inp" id="nc-hr" value="${fmtHoraMin(ANC.hour)}" style="width:90px;font-size:12px"><select class="inp" id="nc-rm" style="flex:1;font-size:12px">${RM.map(r=>`<option value="${r.id}" ${ANC.room===r.id?'selected':''}>${r.n} (${r.c})</option>`).join('')}</select></div><button class="btn btn-s btn-g" onclick="W.addCls()">Crear clase</button></div>`;

  // Función para renderizar timeline de un profesor con mañana antes tarde
  function profTimeline(clases,teacher,sessions,date){
    // Definir sesiones fijas: mañana y tarde
    const morningSess=sessions.find(s=>s.id==='morning');
    const afternoonSess=sessions.find(s=>s.id==='afternoon');
    const orderedSessions=[];
    // Siempre mañana primero, luego tarde
    if(morningSess)orderedSessions.push(morningSess);
    if(afternoonSess)orderedSessions.push(afternoonSess);
    // Si solo hay una sesión (ej: días especiales), usarla
    if(!orderedSessions.length)orderedSessions.push(...sessions);

    const blqs=PROF_BLOQUEOS[teacher]||[];
    let h='';
    orderedSessions.forEach(sess=>{
      const sc=clases.filter(c=>{const m=c.hora_inicio*60;return m>=sess.start&&m<sess.end}).sort((a,b)=>a.hora_inicio-b.hora_inicio);
      const sessLabel=sess.id==='morning'?'MANANA':'TARDE';
      h+=`<div style="font-size:9px;color:var(--t3);margin:4px 0 2px;text-transform:uppercase;letter-spacing:1px;background:rgba(255,255,255,.03);padding:2px 4px;border-radius:3px">${sess.id==='morning'?'☀️':'🌙'} ${sessLabel} ${fmtHoraMin(sess.start/60)}-${fmtHoraMin(sess.end/60)}</div>`;

      // Mostrar bloqueos del profesor en esta sesión
      const sessBlqs=blqs.filter(b=>{
        if(!b.startsWith(date+'-'))return false;
        const bhr=parseInt(b.split('-').pop());
        return bhr*60>=sess.start&&bhr*60<sess.end;
      });
      if(sessBlqs.length){
        const hrs=sessBlqs.map(b=>parseInt(b.split('-').pop())).sort((a,b)=>a-b);
        h+=`<div class="prof-block" data-teacher="${teacher}" data-date="${date}"><span style="color:var(--t3)">🚫 Bloqueado: ${hrs.map(hr=>hr+'h').join(', ')}</span><button class="prof-block-x prof-unblock-btn" data-teacher="${teacher}" data-date="${date}" data-hours="${hrs.join(',')}">✕</button></div>`;
      }

      sc.forEach((c,i)=>{
        h+=tetrisBlock(c,sessions);
        const cEnd=c.hora_inicio*60+clsDurMin(c.duracion_horas,c.descanso_min)+TRANS;
        const nextS=i<sc.length-1?sc[i+1].hora_inicio*60:null;
        if(nextS&&cEnd<nextS)h+=freeSlotBlock(cEnd/60,nextS/60);
      });
      if(!sc.length&&!sessBlqs.length){
        h+=`<div style="padding:4px 8px;border-radius:5px;border:1px dashed rgba(212,168,83,.12);font-size:9px;color:var(--t3);margin-bottom:2px;text-align:center;opacity:.6">— Sesion libre —</div>`;
      }
    });
    return h;
  }

  const daysHTML=Object.entries(weeks).sort(([a],[b])=>Number(a)-Number(b)).map(([wk,dates])=>{
    return`<div style="margin-bottom:18px"><div style="font-size:11px;font-weight:700;color:var(--gold);border-bottom:1px solid var(--brd);padding:5px 0;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">📅 Semana ${fd(dates[0])} – ${fd(dates[dates.length-1])}</div>
${dates.map(date=>{
  const allDc=AD.clases.filter(c=>c.fecha===date).sort((a,b)=>a.hora_inicio-b.hora_inicio);
  const davidDc=allDc.filter(c=>DAVID_SUBS.includes(c.asignatura_id));
  const lupeDc=allDc.filter(c=>LUPE_SUBS.includes(c.asignatura_id));
  const sessions=getDaySessions(date);const nCls=allDc.length;
  return`<div style="margin-bottom:10px;background:var(--card);border-radius:10px;padding:8px;border:1px solid var(--brd)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-weight:700;font-size:13px">${fl(date)}</div><div style="font-size:10px;color:var(--t3)">${nCls?nCls+' clase'+(nCls>1?'s':''):'Sin clases'}</div></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px"><div style="min-width:0;overflow:hidden"><div style="font-size:9px;font-weight:700;color:#4a9eff;text-align:center;padding:2px;background:rgba(74,158,255,.08);border-radius:4px;margin-bottom:3px">⚡ David</div>${profTimeline(davidDc,'David',sessions,date)}</div><div style="min-width:0;overflow:hidden"><div style="font-size:9px;font-weight:700;color:#4ade80;text-align:center;padding:2px;background:rgba(74,222,128,.08);border-radius:4px;margin-bottom:3px">📐 Lupe</div>${profTimeline(lupeDc,'Lupe',sessions,date)}</div></div>
<div style="text-align:center;margin-top:6px"><button class="btn btn-s btn-o bloquear-hora-btn" data-date="${date}" style="font-size:9px;padding:4px 10px">🚫 Bloquear hora</button></div></div>`;
}).join('')}</div>`;
  }).join('');
  return`<div class="fu"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px"><h2 style="font-family:'Playfair Display',serif;font-size:17px;color:var(--gold2)">Horarios (${AD.clases.length})</h2><div style="display:flex;gap:4px"><button class="btn btn-s btn-o" onclick="W.autoOrg()">🤖 Auto</button><button class="btn btn-s" onclick="W.togNew()">+ Nueva</button></div></div>${NC}${daysHTML}</div>`;
}

function buildMsgSP(conPrecio){
  const st=AD.alumnos.find(a=>a.id===ASTU);if(!st)return'';
  const sc=AD.clases.filter(c=>(c.inscripciones||[]).some(i=>i.alumno_id===ASTU)&&(c.inscripciones||[]).length>=2).sort((a,b)=>a.fecha<b.fecha?-1:a.fecha>b.fecha?1:a.hora_inicio-b.hora_inicio);
  if(!sc.length)return'';
  let total=0;
  let m=`🎓 *REPASOS EBAU - Coco Sapiens*\n\nHola ${st.nombre}, tus clases:\n`;
  const bs={};sc.forEach(c=>{const s=SJ.find(x=>x.id===c.asignatura_id);const k=s?.n||c.asignatura_id;if(!bs[k])bs[k]=[];bs[k].push(c)});
  Object.entries(bs).forEach(([n,cls])=>{
    m+=`\n📚 *${n}*\n`;
    cls.forEach(c=>{
      const insc=c.inscripciones||[];const nStu=insc.length;
      const tInfo=(TP[c.asignatura_id]||[]).find(t=>t.name===c.tema);
      const dur=parseFloat(c.duracion_horas||tInfo?.dur||2);
      const brk=parseInt(c.descanso_min||tInfo?.brk||0);
      const et=endTime(c.hora_inicio,dur,brk);
      m+=`  📅 ${fl(c.fecha)} · ${fmtHoraMin(c.hora_inicio)}–${et}${brk?` (${fmtDur(dur)} + ${brk}' descanso)`:` (${fmtDur(dur)})`}\n`;
      m+=`     ${c.tema}\n`;
      if(conPrecio){
        const myInsc=insc.find(i=>i.alumno_id===st.id);
        const rate=myInsc?.precio_hora||(st.es_externo?tarifaExt(nStu):tarifa(nStu));
        const cost=Math.round(rate*dur*100)/100;total+=cost;
        m+=`     ${nStu} alumnos → ${rate}€/h${st.es_externo?' (+5€ externo)':''} · *${cost}€ esta clase*\n`;
      }
    });
  });
  if(conPrecio)m+=`\n━━━━━━━━━━━━━━━━━━━━\n💰 *TOTAL ESTIMADO: ${Math.round(total*100)/100}€*\n`;
  m+=`\n⚠️ Los horarios son firmes una vez confirmados.\n¿Confirmas asistencia? Responde *SÍ* 🙏`;
  return m;
}
function renderSP(conPrecio){
  const el=document.getElementById('sd-pv');if(!el||!ASTU)return;
  const st=AD.alumnos.find(a=>a.id===ASTU);if(!st){el.innerHTML='';return}
  const m=buildMsgSP(conPrecio);
  if(!m){el.innerHTML=`<div style="color:var(--t3);font-size:12px;text-align:center;padding:12px">Sin clases asignadas aún</div>`;return}
  LAST_MSG=m;
  const label=conPrecio?'💰 Con tarifas':'📅 Solo horarios';
  el.innerHTML=`<div style="font-size:10px;color:var(--t3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">${label}</div>
<div style="background:var(--card);border-radius:10px;padding:10px;border:1px solid var(--brd);margin-bottom:8px;max-height:280px;overflow-y:auto">
<pre style="white-space:pre-wrap;font-size:11px;line-height:1.5;font-family:inherit;color:var(--t2);margin:0">${esc(m)}</pre></div>
<button class="btn" id="btn-copy-msg" style="margin-bottom:6px">📋 COPIAR</button>
<button class="btn btn-w" id="btn-share-msg">💬 COMPARTIR POR WHATSAPP</button>`;
  document.getElementById('btn-copy-msg')?.addEventListener('click',()=>copyMsg());
  document.getElementById('btn-share-msg')?.addEventListener('click',()=>shareMsg());
}
function copyMsg(){navigator.clipboard.writeText(LAST_MSG).then(()=>toast('¡Copiado!',true)).catch(()=>{const t=document.createElement('textarea');t.value=LAST_MSG;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();toast('¡Copiado!',true)})}
function shareMsg(){if(navigator.share)navigator.share({text:LAST_MSG}).catch(()=>{});else copyMsg()}

W.openColocarPanel=function(subId,topicName,defaultFecha,defaultHora){
  document.getElementById('colocar-panel')?.remove();
  const sub=SJ.find(s=>s.id===subId);
  const tInfo=(TP[subId]||[]).find(t=>t.name===topicName);
  const dur=tInfo?.dur||2,brk=tInfo?.brk||0,durMin=clsDurMin(dur,brk);
  const stuConTema=AD.alumnos.filter(a=>(a.peticiones||[]).some(p=>p.asignatura_id===subId&&(p.temas||[]).some(t=>t.name===topicName)));
  const div=document.createElement('div');div.id='colocar-panel';
  div.style.cssText='position:fixed;inset:0;background:rgba(15,15,15,.92);z-index:9990;display:flex;align-items:flex-end;justify-content:center;padding:0 0 env(safe-area-inset-bottom)';
  // Hora inicial: validar que sea un número real
  let initTimeStr='16:00';
  if(defaultHora!=null&&!isNaN(defaultHora)){
    const hh=Math.floor(defaultHora);
    const mm=Math.round((defaultHora%1)*60);
    initTimeStr=String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
  }
  const initFecha=defaultFecha||DT[0];
  // Estado interno
  div._fecha=initFecha;
  div._time=initTimeStr;
  // Leer hora del estado (nunca del DOM, para evitar problemas con input type=time en móvil)
  function getHoraInicio(){
    const parts=(div._time||'16:00').split(':');
    const hh=parseInt(parts[0])||0;
    const mm=parseInt(parts[1])||0;
    return hh+mm/60;
  }
  function renderContent(){
    const fecha=div._fecha;
    const horaInicio=getHoraInicio();
    const startMin=Math.round(horaInicio*60),endMin=startMin+durMin;
    const TRANS=5;
    const teacher=sub?.t||'';
    // Teacher conflict (gap=5 min entre clases del mismo profesor)
    const teacherConflicts=AD.clases.filter(c=>c.fecha===fecha&&SJ.find(s=>s.id===c.asignatura_id)?.t===teacher).filter(c=>{
      return clasesSeOlapan(horaInicio,dur,brk,c.hora_inicio,c.duracion_horas,c.descanso_min,TRANS);
    });
    // Student availability (rango completo, gap=5 min entre clases)
    const stuLibres=stuConTema.filter(a=>{
      // Check blocked hours
      const peds=a.peticiones||[];
      for(const pet of peds){
        const bl=pet.horas_bloqueadas||[];
        for(let hMin=startMin;hMin<endMin;hMin+=60){
          if(bl.includes(fecha+'-'+Math.floor(hMin/60)))return false;
        }
      }
      // Check overlap with existing classes (full range, gap=0)
      return !AD.clases.some(c=>{
        if(c.fecha!==fecha)return false;
        if(!(c.inscripciones||[]).some(i=>i.alumno_id===a.id))return false;
        return clasesSeOlapan(horaInicio,dur,brk,c.hora_inicio,c.duracion_horas,c.descanso_min,5);
      });
    });
    const stuOcupados=stuConTema.filter(a=>!stuLibres.some(x=>x.id===a.id));
    // Session validation
    const sessions=getDaySessions(fecha);
    const inSess=sessions.some(s=>startMin>=s.start&&endMin<=s.end);
    const isProfBlocked=profBloqueado(teacher,fecha,horaInicio,durMin);
    const canCreate=inSess&&!teacherConflicts.length&&stuLibres.length>=2&&!isProfBlocked;
    // Warnings
    let warnH='';
    if(!inSess)warnH+=`<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:6px 8px;font-size:11px;color:var(--red);margin-bottom:6px">⛔ Fuera del horario permitido (manana 8-14h, tarde 16-22h)</div>`;
    if(isProfBlocked)warnH+=`<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:6px 8px;font-size:11px;color:var(--red);margin-bottom:6px">🚫 Profesor bloqueado en este horario</div>`;
    teacherConflicts.forEach(c=>{warnH+=`<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:6px;padding:6px 8px;font-size:11px;color:var(--warn);margin-bottom:6px">⚠️ Solape con prof. ${esc(teacher)}: ${esc(c.tema)} ${fmtHoraMin(c.hora_inicio)}–${endTime(c.hora_inicio,c.duracion_horas,c.descanso_min)}</div>`});
    if(stuOcupados.length)warnH+=`<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:6px;padding:6px 8px;font-size:11px;color:var(--warn);margin-bottom:6px">⚠️ Ocupados en ese horario: ${stuOcupados.map(a=>esc(a.nombre)).join(', ')}</div>`;
    const inner=div.querySelector('.cp-inner');
    inner.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div><div style="font-size:13px;font-weight:700;color:${sub?.a||'var(--gold)'}">${sub?.e||''} ${sub?.n||''}</div><div style="font-size:15px;font-weight:700">${esc(topicName)}</div><div style="font-size:11px;color:var(--t3)">⏱ ${fmtDur(dur)}${brk?' + '+brk+'min':''} · ${stuConTema.length} alumnos lo pidieron</div></div><button id="cp-x" style="background:none;border:none;color:var(--t2);cursor:pointer;font-size:22px;padding:4px;min-width:44px;text-align:right">✕</button></div>
<div style="display:flex;gap:6px;margin-bottom:8px"><select id="cp-fecha" class="inp" style="flex:1;font-size:12px">${DT.map(d=>`<option value="${d}">${fl(d)}</option>`).join('')}</select><input type="time" id="cp-time" class="inp" style="width:90px;font-size:12px"></div>
${warnH}<div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:4px">Alumnos libres (${stuLibres.length} de ${stuConTema.length}):</div>
<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">${stuConTema.map(a=>{const ok=stuLibres.some(x=>x.id===a.id);return`<span style="padding:3px 8px;border-radius:5px;font-size:10px;background:${ok?(sub?.bg||'var(--card2)'):'var(--card2)'};border:1px solid ${ok?((sub?.a||'#888')+'40'):'var(--brd)'};color:${ok?(sub?.a||'var(--t)'):'var(--t3)'}">${esc(a.nombre)} ${ok?'✓':'✗'}</span>`}).join('')}</div>
<button id="cp-crear" class="btn btn-g" style="width:100%;padding:12px;${!canCreate?'opacity:0.45;':''}">Crear clase con ${stuLibres.length} alumnos${!inSess?' — horario inválido':stuLibres.length<2?' — faltan alumnos':''}</button>`;
    // Asignar valores programáticamente (iOS Safari ignora value en innerHTML)
    const selFecha=inner.querySelector('#cp-fecha');
    if(selFecha)selFecha.value=fecha;
    const timeInp=inner.querySelector('#cp-time');
    if(timeInp)timeInp.value=div._time;
    // Listeners
    inner.querySelector('#cp-x').addEventListener('click',()=>div.remove());
    selFecha?.addEventListener('change',function(){div._fecha=this.value;renderContent()});
    timeInp?.addEventListener('change',function(){div._time=this.value;renderContent()});
    timeInp?.addEventListener('input',function(){div._time=this.value;renderContent()});
    inner.querySelector('#cp-crear').addEventListener('click',async function(){
      if(!canCreate){toast(stuLibres.length<2?'Faltan alumnos disponibles':'Horario fuera de sesión o con solape');return}
      div.remove();
      await W.colocarTema(subId,topicName,fecha,horaInicio,stuLibres.map(a=>a.id));
    });
  }
  div.innerHTML=`<div class="cp-inner" style="background:var(--bg);border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto"></div>`;
  document.body.appendChild(div);
  renderContent();
};

W.colocarTema=async function(subId,topicName,fecha,horaInicio,stuIds){
  const tInfo=(TP[subId]||[]).find(t=>t.name===topicName);
  const dur=parseFloat(tInfo?.dur||2),brk=parseInt(tInfo?.brk||0);
  // hora_inicio: redondear a minuto exacto para evitar floating point infinito
  const hi=Math.round(horaInicio*60)/60;
  showOv(true,'Creando clase...');
  const {data:cls,error}=await db.from('clases').insert({asignatura_id:subId,tema:topicName,duracion_horas:dur,descanso_min:brk,fecha,hora_inicio:hi,aula:'fondo'}).select().single();
  if(error){
    showOv(false);
    const det=error.details?'\n'+error.details:'';
    const hint=error.hint?'\nPista: '+error.hint:'';
    toast('❌ Error DB ['+error.code+']: '+error.message+det+hint);
    if(error.message.includes('integer')||error.message.includes('syntax')){
      setTimeout(()=>toast('⚠️ Cambia tipo columna en Supabase: hora_inicio y duracion_horas a float8'),1500);
    }
    return;
  }
  cls.inscripciones=[];
  const nStu=stuIds.length;
  for(const sid of stuIds){
    const a=AD.alumnos.find(x=>x.id===sid);
    const ph=parseFloat(a?.es_externo?tarifaExt(nStu):tarifa(nStu));
    const pt=Math.round(ph*dur*100)/100;
    const {data:insc,error:eInsc}=await db.from('inscripciones').insert({clase_id:cls.id,alumno_id:sid,precio_hora:ph,precio_total:pt}).select().single();
    if(eInsc){showOv(false);toast('❌ Error inscripción ['+eInsc.code+']: '+eInsc.message);return;}
    if(insc)cls.inscripciones.push(insc);
  }
  AD.clases.push(cls);
  showOv(false);toast('✅ Clase creada con '+nStu+' alumnos',true);R();
};

W.addCls=async function(){
  if(!ANC.topic||!ANC.date){toast('Completa asignatura, tema y fecha');return}
  const timeStr=document.getElementById('nc-hr')?.value||fmtHoraMin(ANC.hour);
  const [hh,mm]=timeStr.split(':').map(Number);
  const horaInicio=hh+(mm||0)/60;
  if(isNaN(horaInicio)){toast('Hora no válida');return}
  const tInfo=(TP[ANC.sid]||[]).find(t=>t.name===ANC.topic);
  const dur=tInfo?.dur||2,brk=tInfo?.brk||0;
  const durMin=clsDurMin(dur,brk);
  const startMin=Math.round(horaInicio*60),endMin=startMin+durMin;
  // Validate within a session
  const sessions=getDaySessions(ANC.date);
  const inSession=sessions.some(s=>startMin>=s.start&&endMin<=s.end);
  if(!inSession){toast('La hora está fuera del horario permitido (8-14h mañana o 16-22h tarde)');return}
  const TRANS=5;
  const teacher=SJ.find(s=>s.id===ANC.sid)?.t;
  const warns=[];
  // Teacher conflict (gap=5 min entre clases del mismo profesor)
  AD.clases.filter(c=>c.fecha===ANC.date&&SJ.find(s=>s.id===c.asignatura_id)?.t===teacher).forEach(c=>{
    if(clasesSeOlapan(horaInicio,dur,brk,c.hora_inicio,c.duracion_horas,c.descanso_min,TRANS))
      warns.push(`Solape con clase del mismo profesor: ${c.tema} ${fmtHoraMin(c.hora_inicio)}–${endTime(c.hora_inicio,c.duracion_horas,c.descanso_min)}`);
  });
  // Get students who requested this topic
  const candidatos=AD.alumnos.filter(a=>(a.peticiones||[]).some(p=>p.asignatura_id===ANC.sid&&(p.temas||[]).some(t=>t.name===ANC.topic)));
  candidatos.forEach(a=>{
    AD.clases.filter(c=>c.fecha===ANC.date&&(c.inscripciones||[]).some(i=>i.alumno_id===a.id)).forEach(c=>{
      if(clasesSeOlapan(horaInicio,dur,brk,c.hora_inicio,c.duracion_horas,c.descanso_min,0))
        warns.push(`Alumno ${a.nombre} ya tiene: ${c.tema} ${fmtHoraMin(c.hora_inicio)}–${endTime(c.hora_inicio,c.duracion_horas,c.descanso_min)}`);
    });
  });
  if(warns.length&&!confirm('⚠️ Conflictos detectados:\n'+warns.join('\n')+'\n\n¿Crear la clase igualmente?'))return;
  const {data,error}=await db.from('clases').insert({asignatura_id:ANC.sid,tema:ANC.topic,duracion_horas:dur,descanso_min:brk,fecha:ANC.date,hora_inicio:horaInicio,aula:ANC.room}).select().single();
  if(error){toast('Error: '+error.message);return}
  data.inscripciones=[];
  AD.clases.push(data);ANEW=false;toast('✅ Clase creada',true);R();
};

W.togCS=async function(cid,aid){
  const c=AD.clases.find(x=>x.id===cid);if(!c)return;
  if(!c.inscripciones)c.inscripciones=[];
  const idx=c.inscripciones.findIndex(i=>i.alumno_id===aid);
  if(idx>=0){
    await db.from('inscripciones').delete().eq('clase_id',cid).eq('alumno_id',aid);
    c.inscripciones.splice(idx,1);
  } else {
    const rm=RM.find(r=>r.id===c.aula);
    if(c.inscripciones.length>=(rm?.c||8)){toast('Clase llena');return}
    const a=AD.alumnos.find(x=>x.id===aid);
    const nStu=c.inscripciones.length+1;
    const ph=a?.es_externo?tarifaExt(nStu):tarifa(nStu);
    const pt=Math.round(ph*(c.duracion_horas||2)*100)/100;
    const {data}=await db.from('inscripciones').insert({clase_id:cid,alumno_id:aid,precio_hora:ph,precio_total:pt}).select().single();
    if(data)c.inscripciones.push(data);
  }
  // Recalcular precios para todos en esta clase
  const nNew=c.inscripciones.length;
  const tInfo2=(TP[c.asignatura_id]||[]).find(t=>t.name===c.tema);
  const dur2=parseFloat(c.duracion_horas||tInfo2?.dur||2);
  for(const insc of c.inscripciones){
    const a=AD.alumnos.find(x=>x.id===insc.alumno_id);
    const ph=tarifaAlumno(nNew,a?.es_externo);
    const pt=ph>0?Math.round(ph*dur2*100)/100:0;
    await db.from('inscripciones').update({precio_hora:ph,precio_total:pt}).eq('id',insc.id);
    insc.precio_hora=ph;insc.precio_total=pt;
  }
  if(nNew===1)toast('⚠️ Solo 1 alumno — clase no se dará si no se añade otro');
  R();
};
// ═══ HELPERS SCHEDULING ═══
// Devuelve las sesiones disponibles de un día en orden de preferencia
// prioridad: sáb tarde(1) > sáb mañana(2) > dom mañana(3) > dom tarde(4) > vie tarde(5) > fds especiales(6)
function getDaySessions(date){
  const dow=new Date(date+'T12:00:00').getDay();
  const special=['2026-04-01','2026-04-02'].includes(date);
  if(special)return[{id:'morning',start:8*60,end:14*60+10,prio:6}];
  if(dow===5)return[{id:'afternoon',start:18*60,end:22*60+10,prio:5}];
  if(dow===6)return[{id:'afternoon',start:16*60,end:22*60+10,prio:1},{id:'morning',start:8*60,end:14*60+10,prio:2}];
  if(dow===0)return[{id:'morning',start:8*60,end:14*60+10,prio:3},{id:'afternoon',start:16*60,end:22*60+10,prio:4}];
  return[];
}
// Duración total en minutos incluyendo descanso
function clsDurMin(dur,brk){return Math.round(parseFloat(dur||2)*60)+parseInt(brk||0)}
// Utilidad: detectar si dos clases se solapan (con gap opcional en minutos)
function clasesSeOlapan(h1,dur1,brk1,h2,dur2,brk2,gapMin){
  gapMin=gapMin||0;
  const s1=Math.round(h1*60),e1=s1+clsDurMin(dur1,brk1);
  const s2=Math.round(h2*60),e2=s2+clsDurMin(dur2,brk2);
  return s1<e2+gapMin&&e1+gapMin>s2;
}
// Calcula hora_inicio (decimal) para siguiente clase en sesión, exacto al minuto (5 min entre clases)
function nextHoraInicio(session,clasesPuestas,newDurMin,teacher){
  const{start,end,id}=session;
  const TRANS=5;
  const teacherCls=clasesPuestas.filter(c=>SJ.find(s=>s.id===c.asignatura_id)?.t===teacher);
  // Construir lista de intervalos ocupados por el profesor (en minutos)
  const busy=teacherCls.map(c=>({
    s:Math.round(c.hora_inicio*60),
    e:Math.round(c.hora_inicio*60)+clsDurMin(c.duracion_horas,c.descanso_min)
  })).sort((a,b)=>a.s-b.s);

  if(id==='afternoon'){
    // Forward fill: avanzar cursor exactamente 5 min tras cada clase que bloquee
    let cursor=start;
    for(const b of busy){
      if(b.s>=cursor+newDurMin)break;
      if(b.e+TRANS>cursor)cursor=b.e+TRANS;
    }
    if(cursor+newDurMin>end)return null;
    return cursor/60;
  }

  if(id==='morning'){
    // Backward fill: construir ventanas libres y colocar lo más tarde posible
    const windows=[];
    let prev=start;
    for(const b of busy){
      const wEnd=b.s-TRANS;
      if(wEnd>prev)windows.push({s:prev,e:wEnd});
      prev=Math.max(prev,b.e+TRANS);
    }
    windows.push({s:prev,e:end});
    for(let i=windows.length-1;i>=0;i--){
      const w=windows[i];
      if(w.e-w.s>=newDurMin)return Math.max(w.s,w.e-newDurMin)/60;
    }
    return null;
  }
  return null;
}
// Verifica si un alumno tiene solape en fecha+hora (gap=5 min, igual que profesores)
function stuSolape(stuId,fecha,horaInicio,durMin,clases){
  const dur=durMin/60,brk=0;
  return clases.some(c=>{
    if(c.fecha!==fecha)return false;
    if(!(c.inscripciones||[]).some(i=>i.alumno_id===stuId))return false;
    return clasesSeOlapan(horaInicio,dur,brk,c.hora_inicio,c.duracion_horas,c.descanso_min,5);
  });
}
// Fecha límite para un alumno en una asignatura (fin de semana previo al examen)
function getDeadline(alumnoId,subId,clases){
  const a=AD.alumnos.find(x=>x.id===alumnoId);
  const ped=(a?.peticiones||[]).find(p=>p.asignatura_id===subId);
  if(!ped?.fecha_examen)return null;
  const exam=new Date(ped.fecha_examen+'T12:00:00');
  // Retroceder hasta el viernes/sábado/domingo anterior
  let d=new Date(exam);d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}
// Clases que ya tiene un alumno en un día
function stuClasesDia(stuId,fecha,clases){
  return clases.filter(c=>c.fecha===fecha&&(c.inscripciones||[]).some(i=>i.alumno_id===stuId));
}

// Verifica si un profesor está bloqueado en un rango horario
function profBloqueado(teacher,fecha,horaInicio,durMin){
  const blqs=PROF_BLOQUEOS[teacher]||[];
  const startMin=Math.round(horaInicio*60);
  const endMin=startMin+durMin;
  for(let m=startMin;m<endMin;m+=60){
    const hh=Math.floor(m/60);
    const key=fecha+'-'+hh;
    if(blqs.includes(key))return true;
  }
  return false;
}

// Encuentra las 3 mejores opciones de reubicación para una clase
function findTop3Slots(cid){
  const c=AD.clases.find(x=>x.id===cid);if(!c)return[];
  const sub=SJ.find(s=>s.id===c.asignatura_id);
  const tInfo=(TP[c.asignatura_id]||[]).find(t=>t.name===c.tema);
  const dur=parseFloat(c.duracion_horas||tInfo?.dur||2);
  const brk=parseInt(c.descanso_min||tInfo?.brk||0);
  const durMin=clsDurMin(dur,brk);
  const teacher=sub?.t||'';
  const enrolled=(c.inscripciones||[]).map(i=>i.alumno_id);
  const totalAlumnos=enrolled.length;
  const results=[];
  const allSess=[];
  DT.forEach(date=>{getDaySessions(date).forEach(s=>allSess.push({date,...s}))});
  // Ordenar por proximidad a la fecha actual de la clase
  allSess.sort((a,b)=>{
    const da=Math.abs(new Date(a.date+'T12:00:00')-new Date(c.fecha+'T12:00:00'));
    const db2=Math.abs(new Date(b.date+'T12:00:00')-new Date(c.fecha+'T12:00:00'));
    return da-db2||a.prio-b.prio;
  });
  const clsExcl=AD.clases.filter(x=>x.id!==cid);
  for(const sess of allSess){
    const{date,id:sessId,start,end}=sess;
    const horaInicio=nextHoraInicio({id:sessId,start,end},
      clsExcl.filter(x=>{if(x.fecha!==date)return false;const h=x.hora_inicio*60;return h>=start&&h<end;}),
      durMin,teacher);
    if(horaInicio===null)continue;
    // Verificar profesor libre (gap=5, excluyendo clase actual)
    if(clsExcl.some(x=>{if(x.fecha!==date)return false;if(SJ.find(s=>s.id===x.asignatura_id)?.t!==teacher)return false;return clasesSeOlapan(horaInicio,dur,brk,x.hora_inicio,x.duracion_horas,x.descanso_min,TRANS);}))continue;
    // Verificar bloqueo profesor
    if(profBloqueado(teacher,date,horaInicio,durMin))continue;
    // Contar alumnos libres
    const libres=enrolled.filter(sid=>!stuSolape(sid,date,horaInicio,durMin,clsExcl));
    const nLibres=libres.length;
    const noLibres=enrolled.filter(sid=>!libres.includes(sid));
    // Misma sesion bonus
    const origSessId=(c.hora_inicio*60>=start&&c.hora_inicio*60<end&&date===c.fecha)?sessId:'';
    const mismoDia=date===c.fecha;
    const mismaSesion=origSessId===sessId&&mismoDia;
    results.push({fecha:date,horaInicio,nLibres,totalAlumnos,label:`${fl(date)} ${fmtHoraMin(horaInicio)}-${endTime(horaInicio,dur,brk)}`,libres,noLibres,mismoDia,mismaSesion});
    if(results.length>=30)break;
  }
  // Ordenar: todos libres primero, luego por nLibres DESC, luego proximidad
  results.sort((a,b)=>{
    if(a.nLibres===a.totalAlumnos&&b.nLibres!==b.totalAlumnos)return -1;
    if(b.nLibres===b.totalAlumnos&&a.nLibres!==a.totalAlumnos)return 1;
    if(a.nLibres!==b.nLibres)return b.nLibres-a.nLibres;
    if(a.mismoDia!==b.mismoDia)return a.mismoDia?-1:1;
    if(a.mismaSesion!==b.mismaSesion)return a.mismaSesion?-1:1;
    return 0;
  });
  return results.slice(0,3);
}

  }}
  const incompArr=[];

  AUTOORG_INFO={pendientes:pendArr.join('\n')||'✅ Todos los temas tienen clase asignada',incompats:incompArr.join('\n')||'✅ Sin incompatibilidades horarias'};
  const secH=(title,key,items,color)=>`<div style="margin-bottom:12px"><div style="font-weight:700;font-size:12px;color:${color};margin-bottom:5px">${title} (${items.length})</div><pre style="white-space:pre-wrap;font-size:10px;line-height:1.5;font-family:inherit;color:var(--t2);background:var(--card2);padding:8px;border-radius:8px;margin:0;max-height:90px;overflow-y:auto">${esc(AUTOORG_INFO[key])}</pre>${items.length?`<button onclick="copyAutoOrgText('${key}')" style="margin-top:4px;padding:3px 8px;border-radius:5px;border:1px solid var(--brd);background:var(--card);color:var(--t2);font-size:10px;cursor:pointer;font-family:inherit">📋 Copiar</button>`:''}</div>`;
  const solapSecH=solapObjs.length?`<div style="margin-bottom:12px"><div style="font-weight:700;font-size:12px;color:var(--red);margin-bottom:5px">⚠️ Solapes detectados (${solapObjs.length})</div>${solapObjs.map(x=>`<div style="background:var(--card2);border-radius:8px;padding:8px;margin-bottom:5px;border:1px solid rgba(239,68,68,.25)"><div style="font-size:11px;color:var(--t2);margin-bottom:6px">📅 ${fl(x.c1.fecha)}<br><strong>${esc(x.c1.tema)}</strong> (${x.t1||'?'}) ${fmtHoraMin(x.c1.hora_inicio)}–${endTime(x.c1.hora_inicio,x.c1.duracion_horas,x.c1.descanso_min)}<br>↔ <strong>${esc(x.c2.tema)}</strong> (${x.t2||'?'}) ${fmtHoraMin(x.c2.hora_inicio)}–${endTime(x.c2.hora_inicio,x.c2.duracion_horas,x.c2.descanso_min)}${x.shared.length?`<br>👤 ${x.shared.map(n=>esc(n)).join(', ')}`:''}${x.sameTch?`<br>👨‍🏫 Mismo profesor`:''}</div><div style="display:flex;gap:4px"><button class="mvr-btn btn btn-s btn-o" data-cid="${x.c1.id}" style="flex:1;font-size:10px;padding:5px 4px">Mover "${esc(x.c1.tema)}"</button><button class="mvr-btn btn btn-s btn-o" data-cid="${x.c2.id}" style="flex:1;font-size:10px;padding:5px 4px">Mover "${esc(x.c2.tema)}"</button></div></div>`).join('')}</div>`:`<div style="color:var(--grn);font-size:11px;margin-bottom:12px">✅ Sin solapes</div>`;
  const div=document.createElement('div');div.id='autoorg-panel';div.style.cssText='position:fixed;inset:0;background:rgba(15,15,15,.92);z-index:9990;display:flex;align-items:flex-end;justify-content:center';
  div.innerHTML=`<div style="background:var(--bg);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-weight:700;color:var(--gold2);font-size:15px">🤖 Auto-organizar</div><button onclick="document.getElementById('autoorg-panel').remove()" style="background:none;border:none;color:var(--t2);cursor:pointer;font-size:18px">✕</button></div>
${secH('Temas pendientes de asignar','pendientes',pendArr,'var(--gold)')}
${solapSecH}
${secH('Incompatibilidades horarias','incompats',incompArr,'var(--warn)')}
<div style="background:rgba(212,168,83,.06);border:1px solid rgba(212,168,83,.15);border-radius:10px;padding:10px;margin-bottom:14px;font-size:11px;color:var(--t2)">⚠️ Solo se borrarán clases <strong>sin alumnos</strong>. Las que ya tienen alumnos se mantienen.</div>
<button class="btn" onclick="document.getElementById('autoorg-panel').remove();W._doAutoOrg()">🚀 EJECUTAR AUTO-ORG</button>
</div>`;
  document.body.appendChild(div);
  div.querySelectorAll('.mvr-btn').forEach(btn=>btn.addEventListener('click',function(){const cid=this.dataset.cid;document.getElementById('autoorg-panel')?.remove();W.openReubicarPanel(cid);}));
};

W._doAutoOrg=async function(){
  const stu=AD.alumnos;if(!stu.length){toast('No hay alumnos');return}
  showOv(true,'Organizando clases...');

  // 1. Cargar bloqueos de profesores desde config
  try{
    const {data:cfgRows}=await db.from('config').select('clave,valor');
    PROF_BLOQUEOS={David:[],Lupe:[]};
    (cfgRows||[]).forEach(r=>{
      if(r.clave==='bloqueos_David')try{PROF_BLOQUEOS.David=JSON.parse(r.valor)||[]}catch(e){}
      if(r.clave==='bloqueos_Lupe')try{PROF_BLOQUEOS.Lupe=JSON.parse(r.valor)||[]}catch(e){}
    });
  }catch(e){}

  // 2. Separar clases existentes
  const clasesConAlumnos=AD.clases.filter(c=>(c.inscripciones||[]).length>0);
  const clasesVacias=AD.clases.filter(c=>!(c.inscripciones||[]).length);
  for(const c of clasesVacias)await db.from('clases').delete().eq('id',c.id);

  // 3. res = estado actual
  let res=[...clasesConAlumnos];

  // Alumnos: academia primero
  const sorted=[...stu].sort((a,b)=>(a.es_externo?1:0)-(b.es_externo?1:0));

  function stuClasesDiaRes(stuId,fecha){
    return res.filter(c=>c.fecha===fecha&&(c.inscripciones||[]).some(i=>i.alumno_id===stuId));
  }

  // 4. RESOLVER SOLAPES EXISTENTES
  let clasesMovidas=0;
  const sinPlaza=[];
  for(let iter=0;iter<20;iter++){
    let foundSolape=false;
    for(let i=0;i<res.length&&!foundSolape;i++){
      for(let j=i+1;j<res.length&&!foundSolape;j++){
        const c1=res[i],c2=res[j];
        if(c1.fecha!==c2.fecha)continue;
        if(!clasesSeOlapan(c1.hora_inicio,c1.duracion_horas,c1.descanso_min,c2.hora_inicio,c2.duracion_horas,c2.descanso_min,TRANS))continue;
        const ids1=(c1.inscripciones||[]).map(x=>x.alumno_id),ids2=(c2.inscripciones||[]).map(x=>x.alumno_id);
        const shared=ids1.filter(id=>ids2.includes(id));
        const t1=SJ.find(s=>s.id===c1.asignatura_id)?.t,t2=SJ.find(s=>s.id===c2.asignatura_id)?.t;
        if(!shared.length&&!(t1&&t2&&t1===t2))continue;
        // Intentar mover la de menos alumnos
        const pair=ids1.length<=ids2.length?[c1,c2]:[c2,c1];
        let moved=false;
        for(const toMove of pair){
          const tmSub=SJ.find(s=>s.id===toMove.asignatura_id);
          const tmDur=parseFloat(toMove.duracion_horas||2),tmBrk=parseInt(toMove.descanso_min||0);
          const tmDurMin=clsDurMin(tmDur,tmBrk);
          const tmTeacher=tmSub?.t||'';
          const tmStuIds=(toMove.inscripciones||[]).map(x=>x.alumno_id);
          const allSess2=[];
          DT.forEach(date=>{getDaySessions(date).forEach(s=>allSess2.push({date,...s}))});
          allSess2.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:a.prio-b.prio);
          for(const sess of allSess2){
            const hi=nextHoraInicio({id:sess.id,start:sess.start,end:sess.end},
              res.filter(c=>c.id!==toMove.id&&c.fecha===sess.date&&(()=>{const h=c.hora_inicio*60;return h>=sess.start&&h<sess.end})()),
              tmDurMin,tmTeacher);
            if(hi===null)continue;
            if(res.some(c=>c.id!==toMove.id&&c.fecha===sess.date&&SJ.find(s=>s.id===c.asignatura_id)?.t===tmTeacher&&clasesSeOlapan(hi,tmDur,tmBrk,c.hora_inicio,c.duracion_horas,c.descanso_min,TRANS)))continue;
            if(profBloqueado(tmTeacher,sess.date,hi,tmDurMin))continue;
            if(!tmStuIds.every(sid=>!stuSolape(sid,sess.date,hi,tmDurMin,res.filter(c=>c.id!==toMove.id))))continue;
            // Mover
            await db.from('clases').update({fecha:sess.date,hora_inicio:hi}).eq('id',toMove.id);
            toMove.fecha=sess.date;toMove.hora_inicio=hi;
            clasesMovidas++;
            sinPlaza.push({sub:tmSub?.n||'',subId:toMove.asignatura_id,tema:toMove.tema,causa:`Movida a ${fl(sess.date)} ${fmtHoraMin(hi)} para resolver solape`,tipo:'aviso'});
            moved=true;break;
          }
          if(moved)break;
        }
        if(!moved){
          sinPlaza.push({sub:SJ.find(s=>s.id===pair[0].asignatura_id)?.n||'',subId:pair[0].asignatura_id,tema:pair[0].tema+' / '+pair[1].tema,causa:'Solape existente no resuelto automáticamente',tipo:'aviso'});
        }
        foundSolape=true;
      }
    }
    if(!foundSolape)break;
  }

  // 5. CONSTRUIR PENDIENTES
  const pendientes=[];
  for(const sub of SJ){
    const dem={};
    sorted.forEach(s=>{
      const ped=(s.peticiones||[]).find(p=>p.asignatura_id===sub.id);
      if(!ped)return;
      (ped.temas||[]).forEach(t=>{
        if(!dem[t.name])dem[t.name]={urg:0,prSum:0,n:0,sts:[],stuMap:{},subId:sub.id,extCount:0,acadCount:0};
        dem[t.name].urg+=(t.urgent?1:0);dem[t.name].prSum+=t.priority;dem[t.name].n++;
        dem[t.name].sts.push(s.id);dem[t.name].stuMap[s.id]=ped;
        if(s.es_externo)dem[t.name].extCount++;else dem[t.name].acadCount++;
      });
    });
    const topsSorted=Object.entries(dem)
      .filter(([,v])=>v.sts.length>=2)
      .filter(([name])=>!res.some(c=>c.asignatura_id===sub.id&&c.tema===name))
      .sort((a,b)=>{
        if(b[1].urg!==a[1].urg)return b[1].urg-a[1].urg;
        if(b[1].acadCount!==a[1].acadCount)return b[1].acadCount-a[1].acadCount;
        return(a[1].prSum/a[1].n)-(b[1].prSum/b[1].n);
      });
    topsSorted.forEach(([name,info])=>pendientes.push({sub,name,info}));
  }

  // Sesiones disponibles
  const allSessions=[];
  DT.forEach(date=>{getDaySessions(date).forEach(s=>allSessions.push({date,...s}))});
  allSessions.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:a.prio-b.prio);

  const clasesCreadas=[];

  // 6. PARA CADA TEMA PENDIENTE
  for(const{sub,name,info} of pendientes){
    const tInfo=(TP[sub.id]||[]).find(t=>t.name===name);
    const dur=tInfo?.dur||2,brk=tInfo?.brk||0;
    const durMin=clsDurMin(dur,brk);
    let colocado=false;

    function getFechaLimite(sid){
      const ped=info.stuMap[sid];
      if(!ped||!ped.fecha_examen)return null;
      if(ped.es_ebau===false)return{fecha:ped.fecha_examen,duro:true};
      const t2=(ped.temas||[]).find(t=>t.name===name);
      if(t2?.urgent)return{fecha:ped.fecha_examen,duro:false};
      return null;
    }

    // Recoger info de sesiones para sinPlaza con opcionesSlots
    const sesionesInfo=[];

    for(const sess of allSessions){
      if(colocado)break;
      const{date,id:sessId,start,end}=sess;

      // Verificar profesor no bloqueado
      const horaInicio=nextHoraInicio({id:sessId,start,end},
        res.filter(c=>c.fecha===date&&(()=>{const h=c.hora_inicio*60;return h>=start&&h<end})()),
        durMin,sub.t);
      if(horaInicio===null)continue;

      // Verificar bloqueo de profesor
      if(profBloqueado(sub.t,date,horaInicio,durMin))continue;

      // Verificar profesor sin solapamiento
      if(res.some(c=>{
        if(c.fecha!==date)return false;
        if(SJ.find(s=>s.id===c.asignatura_id)?.t!==sub.t)return false;
        return clasesSeOlapan(horaInicio,dur,brk,c.hora_inicio,c.duracion_horas,c.descanso_min,TRANS);
      }))continue;

      // Filtrar alumnos disponibles (filtros obligatorios: bloqueo + solape + límite duro no-EBAU)
      const av=info.sts.filter(sid=>{
        const ped=info.stuMap[sid];
        const fl2=getFechaLimite(sid);
        if(fl2&&fl2.duro&&date>fl2.fecha)return false;
        const blk=ped.horas_bloqueadas||[];
        const clsS=horaInicio*60,clsE=clsS+durMin;
        const hasBlock=blk.some(b=>{if(!b.startsWith(date+'-'))return false;const bhr=parseInt(b.split('-').pop());return bhr*60<clsE&&(bhr+1)*60>clsS});
        if(hasBlock)return false;
        if(stuSolape(sid,date,horaInicio,durMin,res))return false;
        return true;
      });

      // Registrar para opciones slots
      const avNames=av.map(sid=>{const a=sorted.find(x=>x.id===sid);return a?.nombre||sid});
      const noAvNames=info.sts.filter(sid=>!av.includes(sid)).map(sid=>{const a=sorted.find(x=>x.id===sid);return a?.nombre||sid});
      sesionesInfo.push({fecha:date,horaInicio,alumnosOk:avNames,alumnosNo:noAvNames,alumnoIds:av,nDisp:av.length});

      if(av.length>=2){
        // Crear clase
        const usedRooms=res.filter(c=>c.fecha===date&&clasesSeOlapan(horaInicio,dur,brk,c.hora_inicio,c.duracion_horas,c.descanso_min,0)).map(c=>c.aula);
        const rm=RM.find(r=>!usedRooms.includes(r.id));
        if(!rm)continue;
        const{data:cls}=await db.from('clases').insert({asignatura_id:sub.id,tema:name,duracion_horas:dur,descanso_min:brk,fecha:date,hora_inicio:horaInicio,aula:rm.id}).select().single();
        if(!cls)continue;
        cls.inscripciones=[];
        const stuToAdd=av.slice(0,rm.c);
        const nStu=stuToAdd.length;
        for(const sid of stuToAdd){
          const a=sorted.find(x=>x.id===sid);
          const ph=tarifaAlumno(nStu,a?.es_externo);
          const pt=Math.round(ph*dur*100)/100;
          const{data:insc}=await db.from('inscripciones').insert({clase_id:cls.id,alumno_id:sid,precio_hora:ph,precio_total:pt}).select().single();
          if(insc)cls.inscripciones.push(insc);
        }
        res.push(cls);clasesCreadas.push(cls);colocado=true;
      }
    }

    if(!colocado&&!sinPlaza.find(x=>x.tema===name&&x.tipo!=='aviso')){
      // Encontrar las 3 mejores sesiones
      const top3=sesionesInfo.sort((a,b)=>b.nDisp-a.nDisp).slice(0,3);
      const noEbauSinHueco=info.sts.filter(sid=>{const fl2=getFechaLimite(sid);return fl2&&fl2.duro;});
      let causa='No hay hueco disponible con 2+ alumnos';
      if(noEbauSinHueco.length>0){
        const fechas=noEbauSinHueco.map(sid=>{const p=info.stuMap[sid];return p.fecha_examen?fd(p.fecha_examen):'?'});
        causa=`Fuera del plazo (examen el ${[...new Set(fechas)].join(', ')})`;
      }
      sinPlaza.push({sub:sub.n,subId:sub.id,tema:name,causa,
        alumnosAfectados:info.sts.map(sid=>{const a=sorted.find(x=>x.id===sid);return a?.nombre||sid}),
        opcionesSlots:top3.map(s=>({fecha:s.fecha,horaInicio:s.horaInicio,alumnosOk:s.alumnosOk,alumnosNo:s.alumnosNo,alumnoIds:s.alumnoIds}))
      });
    }
  }

  AD.clases=res;
  showOv(false);

  // 7. MOSTRAR RESULTADO
  const nCreadas=clasesCreadas.length;
  const errores=sinPlaza.filter(x=>x.tipo!=='aviso');
  const avisos=sinPlaza.filter(x=>x.tipo==='aviso');

  const div=document.createElement('div');div.id='autoorg-result';
  div.style.cssText='position:fixed;inset:0;background:rgba(15,15,15,.92);z-index:9990;display:flex;align-items:flex-end;justify-content:center';
  let resultH=`<div class="aor-inner" style="background:var(--bg);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;position:relative">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-weight:700;color:var(--gold2);font-size:15px">🤖 Resultado Auto-org</div><button class="aor-close" style="background:none;border:none;color:var(--t2);cursor:pointer;font-size:18px">✕</button></div>
<div style="display:flex;gap:8px;margin-bottom:14px">
<div style="flex:1;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--grn)">${nCreadas}</div><div style="font-size:10px;color:var(--t2)">creadas</div></div>
<div style="flex:1;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--warn)">${errores.length}</div><div style="font-size:10px;color:var(--t2)">pendientes</div></div>
<div style="flex:1;background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.2);border-radius:10px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:800;color:#4a9eff">${clasesMovidas}</div><div style="font-size:10px;color:var(--t2)">movidas</div></div>
</div>`;

  if(errores.length){
    resultH+=`<div style="font-weight:700;font-size:12px;color:var(--red);margin-bottom:8px">⚠️ Temas sin colocar (${errores.length})</div>`;
    errores.forEach((x,idx)=>{
      const subObj=SJ.find(s=>s.n===x.sub);
      resultH+=`<div class="aor-item" data-idx="${idx}" style="background:var(--card);border-radius:10px;padding:10px;margin-bottom:6px;border:1px solid rgba(239,68,68,.2)">
<div style="font-size:12px;font-weight:700;color:${subObj?.a||'var(--t)'}">${subObj?.e||''} ${esc(x.sub)}</div>
<div style="font-size:13px;font-weight:600;margin-top:2px">${esc(x.tema)}</div>
<div style="font-size:11px;color:var(--red);margin-top:3px">${esc(x.causa)}</div>`;
      // Opciones de slots
      if(x.opcionesSlots&&x.opcionesSlots.length){
        x.opcionesSlots.forEach((sl,si)=>{
          const tInfo2=(TP[x.subId]||[]).find(t=>t.name===x.tema);
          const dur2=tInfo2?.dur||2,brk2=tInfo2?.brk||0;
          resultH+=`<div class="sinplaza-slot" style="margin-top:6px;position:relative">
<div style="display:flex;justify-content:space-between;align-items:center">
<div style="flex:1"><div style="font-size:11px;font-weight:600">${fl(sl.fecha)} ${fmtHoraMin(sl.horaInicio)}-${endTime(sl.horaInicio,dur2,brk2)}</div>
<div style="margin-top:3px">${sl.alumnosOk.map(n=>`<span class="sp-alu ok">${esc(n)}</span>`).join('')}${sl.alumnosNo.map(n=>`<span class="sp-alu no" data-alu-name="${esc(n)}" data-fecha="${sl.fecha}">${esc(n)}</span>`).join('')}</div></div>
<button class="aor-mover-btn" data-subid="${x.subId}" data-tema="${esc(x.tema)}" data-fecha="${sl.fecha}" data-hora="${sl.horaInicio}" data-stuids="${(sl.alumnoIds||[]).join(',')}" style="padding:5px 10px;border-radius:6px;border:none;background:var(--grn);color:#000;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">Mover aqui</button>
</div></div>`;
        });
      }
      resultH+=`<button class="aor-manual-btn" data-subid="${x.subId}" data-tema="${esc(x.tema)}" style="margin-top:6px;padding:5px 10px;border-radius:6px;border:1px solid var(--gold);background:rgba(212,168,83,.08);color:var(--gold);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;text-align:center">Elegir horario manualmente</button>
</div>`;
    });
  }
  if(avisos.length){
    resultH+=`<div style="font-weight:700;font-size:12px;color:var(--warn);margin-bottom:8px;margin-top:8px">📝 Avisos (${avisos.length})</div>`;
    avisos.forEach(x=>{
      resultH+=`<div style="background:rgba(245,158,11,.04);border-radius:8px;padding:8px;margin-bottom:4px;border:1px solid rgba(245,158,11,.15);font-size:11px;color:var(--t2)">
<span style="color:var(--warn);font-weight:600">${esc(x.sub)} — ${esc(x.tema)}:</span> ${esc(x.causa)}</div>`;
    });
  }
  if(!errores.length&&!avisos.length){
    resultH+=`<div style="text-align:center;padding:16px;font-size:14px;color:var(--grn)">Todos los temas colocados correctamente</div>`;
  }
  resultH+=`</div>`;
  div.innerHTML=resultH;
  document.body.appendChild(div);

  // Bind botones del panel de resultados
  div.querySelector('.aor-close')?.addEventListener('click',()=>div.remove());
  div.querySelectorAll('.aor-mover-btn').forEach(btn=>btn.addEventListener('click',async function(){
    const subId=this.dataset.subid;
    const tema=this.dataset.tema;
    const fecha=this.dataset.fecha;
    const hora=parseFloat(this.dataset.hora);
    const stuIds=(this.dataset.stuids||'').split(',').filter(Boolean);
    if(!stuIds.length){toast('Sin alumnos disponibles');return}
    await W.colocarTema(subId,tema,fecha,hora,stuIds);
    this.closest('.aor-item')?.remove();
  }));
  div.querySelectorAll('.aor-manual-btn').forEach(btn=>btn.addEventListener('click',function(){
    const subId=this.dataset.subid;const tema=this.dataset.tema;
    div.remove();
    W.openColocarPanel(subId,tema,null,null);
  }));
  // Popup de incompatibilidades de alumno
  div.querySelectorAll('.sp-alu.no').forEach(el=>el.addEventListener('click',function(e){
    e.stopPropagation();
    // Cerrar popups previos
    div.querySelectorAll('.alu-popup').forEach(p=>p.remove());
    const aluName=this.dataset.aluName;
    const fecha=this.dataset.fecha;
    const a=AD.alumnos.find(x=>x.nombre===aluName);
    if(!a)return;

    popH+=`<div style="font-size:10px;color:var(--t3);margin-bottom:4px">Horas bloqueadas:</div>`;
    nearDates.forEach(dt=>{
      const dayBlk=[];
      for(let h=8;h<=21;h++){if(allBlk.has(dt+'-'+h))dayBlk.push(h+'h');}
      if(dayBlk.length)popH+=`<div style="font-size:10px;margin-bottom:2px"><strong>${fl(dt)}</strong>: ${dayBlk.join(', ')}</div>`;
    });
    // Verificar solapes con clases existentes
    const aClases=AD.clases.filter(c=>(c.inscripciones||[]).some(i=>i.alumno_id===a.id));
    const nearCls=aClases.filter(c=>nearDates.includes(c.fecha));
    if(nearCls.length){
      popH+=`<div style="font-size:10px;color:var(--t3);margin-top:4px">Clases asignadas:</div>`;
      nearCls.forEach(c=>{
        const s=SJ.find(x=>x.id===c.asignatura_id);
        popH+=`<div style="font-size:10px;margin-bottom:1px">${fl(c.fecha)} ${fmtHoraMin(c.hora_inicio)}: ${s?.e||''} ${c.tema}</div>`;
      });
    }
    if(!allBlk.size&&!nearCls.length)popH+=`<div style="font-size:10px;color:var(--grn)">Sin restricciones</div>`;
    const popup=document.createElement('div');
    popup.className='alu-popup';
    popup.innerHTML=popH;
    const rect=this.getBoundingClientRect();
    const panelRect=div.querySelector('.aor-inner').getBoundingClientRect();
    popup.style.left=Math.min(rect.left-panelRect.left,panelRect.width-270)+'px';
    popup.style.top=(rect.bottom-panelRect.top+4)+'px';
    this.closest('.sinplaza-slot')?.appendChild(popup);
    popup.querySelector('.alu-popup-x')?.addEventListener('click',e2=>{e2.stopPropagation();popup.remove()});
    // Cerrar al click fuera
    setTimeout(()=>{
      const closeHandler=function(ev){if(!popup.contains(ev.target)){popup.remove();document.removeEventListener('click',closeHandler)}};
      document.addEventListener('click',closeHandler);
    },10);
  }));

  toast(`${nCreadas} creadas${clasesMovidas?' · '+clasesMovidas+' movidas':''}${errores.length?' · '+errores.length+' pendientes':''}`,true);
  R();
};

W.moverBloque=async function(cid,delta){
  const c=AD.clases.find(x=>x.id===cid);if(!c)return;
  const sub=SJ.find(s=>s.id===c.asignatura_id);
  const tInfo=(TP[c.asignatura_id]||[]).find(t=>t.name===c.tema);
  const dur=parseFloat(c.duracion_horas||tInfo?.dur||2);
  const brk=parseInt(c.descanso_min||tInfo?.brk||0);
  const durMin=clsDurMin(dur,brk);
  const sessions=getDaySessions(c.fecha);
  const curMin=c.hora_inicio*60;
  const newMin=curMin+delta;
  const newH=newMin/60;
  // Check session bounds
  const sess=sessions.find(s=>newMin>=s.start&&newMin+durMin<=s.end);
  if(!sess){toast('Fuera de sesión');return}
  // Check teacher overlap (push if needed) — gap=5 para mismo profesor
  const otherCls=AD.clases.filter(x=>x.id!==cid&&x.fecha===c.fecha&&SJ.find(s=>s.id===x.asignatura_id)?.t===sub.t);
  const nS=newMin,nE=newMin+durMin;
  const conflict=otherCls.find(x=>clasesSeOlapan(newH,dur,brk,x.hora_inicio,x.duracion_horas,x.descanso_min,5));
  if(conflict){
    // Try to push the conflicting class
    const cfDur=clsDurMin(conflict.duracion_horas,conflict.descanso_min);
    const pushMin=conflict.hora_inicio*60+delta;
    const pushSess=sessions.find(s=>pushMin>=s.start&&pushMin+cfDur<=s.end);
    if(!pushSess){toast('No se puede empujar la clase adyacente');return}
    await db.from('clases').update({hora_inicio:pushMin/60}).eq('id',conflict.id);
    conflict.hora_inicio=pushMin/60;
  }
  // Check student overlap (warn only) — gap=0 para alumnos
  const stuIds=(c.inscripciones||[]).map(i=>i.alumno_id);
  const stuConf=stuIds.filter(sid=>{
    const otherStu=AD.clases.filter(x=>x.id!==cid&&x.fecha===c.fecha&&(x.inscripciones||[]).some(i=>i.alumno_id===sid));
    return otherStu.some(x=>clasesSeOlapan(newH,dur,brk,x.hora_inicio,x.duracion_horas,x.descanso_min,5));
  });
  if(stuConf.length){toast('Aviso: solape de alumno(s): '+stuConf.map(sid=>{const a=AD.alumnos.find(x=>x.id===sid);return a?.nombre||sid}).join(', '))}
  await db.from('clases').update({hora_inicio:newH}).eq('id',cid);
  c.hora_inicio=newH;
  R();
};

W.eliminarBloqueo=async function(teacher,date,hoursStr){
  const hours=hoursStr.split(',').map(Number);
  const blqs=(PROF_BLOQUEOS[teacher]||[]).filter(b=>{
    if(!b.startsWith(date+'-'))return true;
    const bhr=parseInt(b.split('-').pop());

W.checkCPOverlap=function(cid){
  const c=AD.clases.find(x=>x.id===cid);if(!c)return;
  const tInfo=(TP[c.asignatura_id]||[]).find(t=>t.name===c.tema);
  const dur=parseFloat(c.duracion_horas||tInfo?.dur||2);
  const brk=parseInt(c.descanso_min||tInfo?.brk||0);
  const durMin=clsDurMin(dur,brk);
  const newDate=document.getElementById('cp-dt-'+cid)?.value||c.fecha;
  const timeStr=document.getElementById('cp-hr-'+cid)?.value;
  const warnEl=document.getElementById('cp-warn-'+cid);if(!warnEl)return;
  if(!timeStr){warnEl.style.display='none';return}
  const [hh,mm]=timeStr.split(':').map(Number);const newHour=hh+(mm||0)/60;
  const newStart=Math.round(newHour*60),newEnd=newStart+durMin;
  const teacher=SJ.find(s=>s.id===c.asignatura_id)?.t;
  const warns=[];
  // Check teacher overlap (excluding this class) — gap=5 para mismo profesor
  AD.clases.filter(x=>x.id!==cid&&x.fecha===newDate&&SJ.find(s=>s.id===x.asignatura_id)?.t===teacher).forEach(x=>{
    if(clasesSeOlapan(newHour,dur,brk,x.hora_inicio,x.duracion_horas,x.descanso_min,5))
      warns.push(`⚠️ Solape con clase del mismo profesor: ${x.tema} ${fmtHoraMin(x.hora_inicio)}–${endTime(x.hora_inicio,x.duracion_horas,x.descanso_min)}`);
  });
  // Check student overlap (excluding this class) — gap=5 min entre clases
  const enrolled=(c.inscripciones||[]).map(i=>i.alumno_id);
  enrolled.forEach(sid=>{
    AD.clases.filter(x=>x.id!==cid&&x.fecha===newDate&&(x.inscripciones||[]).some(i=>i.alumno_id===sid)).forEach(x=>{
      if(clasesSeOlapan(newHour,dur,brk,x.hora_inicio,x.duracion_horas,x.descanso_min,5)){
        const a=AD.alumnos.find(al=>al.id===sid);
        warns.push(`⚠️ Alumno ${a?.nombre||sid} ya tiene clase: ${x.tema} ${fmtHoraMin(x.hora_inicio)}–${endTime(x.hora_inicio,x.duracion_horas,x.descanso_min)}`);
      }
    });
  });
  if(warns.length){warnEl.innerHTML=warns.join('<br>');warnEl.style.display='block'}
  else{warnEl.style.display='none'}
};

function stuLibreEnHorario(alumno,sub,fecha,horaInicio,durMin){
  // Check horas_bloqueadas del alumno para todas sus asignaturas (no solo la actual)
  const peds=alumno.peticiones||[];
  for(const pet of peds){
    const blocked=pet.horas_bloqueadas||[];
    const startMin=Math.round(horaInicio*60);
    for(let hMin=startMin;hMin<startMin+durMin;hMin+=60){
      const key=fecha+'-'+Math.floor(hMin/60);
      if(blocked.includes(key))return false;
    }
  }
  // Check no inscripción solapada (rango completo, gap=0 para alumnos)
  if(stuSolape(alumno.id,fecha,horaInicio,durMin,AD.clases))return false;
  return true;
}
function findAvailableSlots(sub,topicName,maxSlots){
  maxSlots=maxSlots||3;
  const tInfo=(TP[sub.id]||[]).find(t=>t.name===topicName);
  const dur=tInfo?.dur||2,brk=tInfo?.brk||0;
  const durMin=clsDurMin(dur,brk);
  const stuConTema=AD.alumnos.filter(a=>(a.peticiones||[]).some(p=>p.asignatura_id===sub.id&&(p.temas||[]).some(t=>t.name===topicName)));
  if(stuConTema.length<2)return{reason:'Solo '+stuConTema.length+' alumno'+(stuConTema.length===1?'':'s')+' lo pidió (mínimo 2 para abrir grupo)',slots:[]};
  const sinAsignar=stuConTema.filter(a=>{const clasesTema=AD.clases.filter(c=>c.asignatura_id===sub.id&&c.tema===topicName&&(c.inscripciones||[]).length>=2);return!clasesTema.some(c=>(c.inscripciones||[]).some(i=>i.alumno_id===a.id))});
  if(!sinAsignar.length)return{reason:'Todos asignados',slots:[]};
  const slots=[];
  for(let di=0;di<DT.length&&slots.length<maxSlots;di++){
    const fecha=DT[di];
    const sessions=getDaySessions(fecha);
    for(let si=0;si<sessions.length&&slots.length<maxSlots;si++){
      const sess=sessions[si];
      const clasesFecha=AD.clases.filter(c=>c.fecha===fecha&&(()=>{const h=Math.round(c.hora_inicio*60);return h>=sess.start&&h<sess.end})());
      const horaInicio=nextHoraInicio(sess,clasesFecha,durMin,sub.t);
      if(horaInicio===null)continue;
      const libres=sinAsignar.filter(a=>stuLibreEnHorario(a,sub,fecha,horaInicio,durMin));
      if(libres.length>=2)slots.push({fecha,horaInicio,nLibres:libres.length,stuIds:libres.map(a=>a.id)});
    }
  }
  if(!slots.length)return{reason:'Sin hueco donde haya ≥2 alumnos disponibles',slots:[]};
  return{reason:null,slots};
}

    const f=d.finalDate?new Date(d.finalDate+'T12:00:00'):null;
    m+=`📅 Final: ${f?f.getDate()+'/'+(f.getMonth()+1)+'/'+f.getFullYear():'??'}${d.estimated?' (estimada)'+(d.weekHint?' → '+d.weekHint:''):''}\n📋 Temas:\n`;
    d.topics.forEach((t,i)=>{const info=(TP[sid]||[]).find(x=>x.name===t.name);m+=`  ${i+1}. ${t.name}${info?' ('+fmtDur(info.dur)+')':''}${t.urgent?' 🔥':''}\n`});
    if(d.blocked.length){
      m+=`🚫 No puedo:\n`;
      const byDate={};d.blocked.forEach(b=>{const p=b.lastIndexOf('-');const dt=b.substring(0,p);const hr=parseInt(b.substring(p+1));if(!byDate[dt])byDate[dt]=[];byDate[dt].push(hr)});
      Object.keys(byDate).sort().forEach(k=>{const hrs=byDate[k].sort((a,b)=>a-b);const groups=[];let start=hrs[0],prev=hrs[0];for(let i=1;i<hrs.length;i++){if(hrs[i]===prev+1)prev=hrs[i];else{groups.push([start,prev+1]);start=hrs[i];prev=hrs[i]}}groups.push([start,prev+1]);groups.forEach(([s,e])=>{m+=`  ${fd(k)} ${s}:00-${e}:00\n`})});
      if(d.blockNote)m+=`  📝 ${d.blockNote}\n`;
    } else m+=`✅ Disponibilidad total\n`;
  });
  // Aviso repartidas con más clases que días
  if(!REG.prefConcentrar){
    const totalTemas=S.subs.reduce((acc,s)=>(S.data[s]?.topics?.length||0)+acc,0);
    if(totalTemas>DT.length)m+=`\n📌 Nota: has pedido más clases que días disponibles, por lo que algún día habrás de dar 2 clases.\n`;
  }
  m+=`\n✅ ACEPTO las condiciones\n━━━━━━━━━━━━━━━━━━━━`;
  S.msg=m;
}

function getCentro(){return REG.centro==='OTRO'?(REG._centroOtro||'').trim():REG.centro}
async function saveToSupabase(){
  showOv(true,'Guardando tu petición...');
  const centro=getCentro();
  try{
    // Check if alumno already exists (normalized)
    const {data:allA}=await db.from('alumnos').select('id,nombre,apellidos');
    const nN=normStr(REG.nombre),nAp=normStr(REG.apellidos);
    const existing=allA?.find(a=>normStr(a.nombre)===nN&&normStr(a.apellidos)===nAp)||null;
    let alumnoId;
    if(existing){
      alumnoId=existing.id;
      await db.from('alumnos').update({telefono:REG.telefono,centro:centro,es_externo:REG.esExterno,prefiere_concentrar:REG.prefConcentrar,pin:REG.pin}).eq('id',alumnoId);
    } else {
      const {data:newA,error:errA}=await db.from('alumnos').insert({nombre:REG.nombre,apellidos:REG.apellidos,telefono:REG.telefono,centro:centro,es_externo:REG.esExterno,prefiere_concentrar:REG.prefConcentrar,pin:REG.pin}).select().single();
      if(errA)throw errA;
      alumnoId=newA.id;
    }
    // Delete old peticiones and insert new
    await db.from('peticiones').delete().eq('alumno_id',alumnoId);
    for(const sid of S.subs){
      const d=S.data[sid];
      await db.from('peticiones').insert({alumno_id:alumnoId,asignatura_id:sid,temas:d.topics,horas_bloqueadas:d.blocked,fecha_examen:d.finalDate||null,es_ebau:d.ebau,fecha_estimada:d.estimated,semana_hint:d.weekHint||null,nota_bloqueo:d.blockNote||null});
    }
    showOv(false);
    toast('✅ Petición guardada',true);
  } catch(e){
    showOv(false);
    toast('Error al guardar: '+e.message);
  }
}

function editarPeticion(){
  // Reload wizard with existing data
  S={step:0,subs:[],data:{},tabs:{},openDay:{},accepted:false,msg:''};
  const peds=ALUMNO.peticiones||[];
  peds.forEach(p=>{
    S.subs.push(p.asignatura_id);
    S.data[p.asignatura_id]={ebau:p.es_ebau,finalDate:p.fecha_examen||'',estimated:p.fecha_estimada,weekHint:p.semana_hint||'',topics:p.temas||[],blocked:p.horas_bloqueadas||[],blockNote:p.nota_bloqueo||''};
    S.tabs[p.asignatura_id]='topics';S.openDay[p.asignatura_id]=null;
  });
  REG.nombre=ALUMNO.nombre;REG.apellidos=ALUMNO.apellidos;REG.telefono=ALUMNO.telefono||'';REG.centro=ALUMNO.centro||'';REG.esExterno=ALUMNO.es_externo;REG.prefConcentrar=ALUMNO.prefiere_concentrar;REG.pin=ALUMNO.pin;
  go('wizard');
}

// ═══ SUPABASE OPS ═══
async function doLogin(){
  showOv(true,'Verificando...');
  // Fetch all alumnos and compare normalized
  const {data:allAlumnos,error}=await db.from('alumnos').select('*, peticiones(*)');
  const nNombre=normStr(LG.nombre),nApellidos=normStr(LG.apellidos),nPin=String(LG.pinBuf).trim();
  const data=allAlumnos?.find(a=>normStr(a.nombre)===nNombre&&normStr(a.apellidos)===nApellidos&&String(a.pin).trim()===nPin)||null;
  if(error||!data){
    showOv(false);
    document.getElementById('pin-err').textContent='PIN incorrecto o datos no encontrados';
    LG.pinBuf='';
    document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('filled'));
    return;
  }
  ALUMNO=data;
  // Load config (edicion_activa)
  const {data:cfgRows}=await db.from('config').select('clave,valor');
  STU_CFG={};
  (cfgRows||[]).forEach(r=>{STU_CFG[r.clave]=r.valor});
  // Load classes for this student
  const {data:clases}=await db.from('clases').select('*, inscripciones(*)').in('id',
    (await db.from('inscripciones').select('clase_id').eq('alumno_id',ALUMNO.id)).data?.map(i=>i.clase_id)||[]
  );
  ALUMNO_CLASES=clases||[];
  showOv(false);go('stu-home');
}

async function doAdminLogin(){
  const pass=document.getElementById('adm-pass')?.value;
  if(pass!==ADMIN_PASS){document.getElementById('adm-err').textContent='Contraseña incorrecta';return}
  showOv(true,'Cargando datos...');
  await loadAdminData();
  ADMIN=true;showOv(false);AT='alumnos';go('admin');
}

async function loadAdminData(){
  const [r1,r2,r3]=await Promise.all([
    db.from('alumnos').select('*, peticiones(*)').order('apellidos'),
    db.from('clases').select('*, inscripciones(*)').order('fecha').order('hora_inicio'),
    db.from('config').select('*')
  ]);
  AD.alumnos=r1.data||[];
  AD.clases=r2.data||[];
  AD.config={};(r3.data||[]).forEach(c=>AD.config[c.clave]=c.valor);
  // Cargar bloqueos de profesor
  PROF_BLOQUEOS={David:[],Lupe:[]};
  if(AD.config.bloqueos_David)try{PROF_BLOQUEOS.David=JSON.parse(AD.config.bloqueos_David)||[]}catch(e){}
  if(AD.config.bloqueos_Lupe)try{PROF_BLOQUEOS.Lupe=JSON.parse(AD.config.bloqueos_Lupe)||[]}catch(e){}
}

// ═══ BACK BUTTON MÓVIL ═══
window.addEventListener('popstate',function(){
  if(V==='splash'){history.pushState({v:'splash'},'','');return}
  if(V==='reg'){
    if(REG.step==='datos')V='splash';
    else if(REG.step==='config')REG.step='datos';
    else if(REG.step==='pin')REG.step='config';
    else if(REG.step==='pin2'){REG.step='pin';REG.pinBuf='';REG.pinBuf2='';}
  } else if(V==='wizard'){
    if(S.step===0)V='splash';else S.step--;
  } else if(V==='fin'){
    S.step=S.subs.length;V='wizard';
  } else if(V==='login-pin'){
    LG.pinBuf='';V='login';
  } else if(V==='stu-home'){
    ALUMNO=null;ALUMNO_CLASES=[];V='splash';
  } else if(V==='admin'){
    ADMIN=false;AD={alumnos:[],clases:[],config:{}};V='splash';
  } else {
    V='splash';
  }
  R();window.scrollTo(0,0);
});

// ═══ INIT ═══
history.replaceState({v:'splash'},'','');
R();
