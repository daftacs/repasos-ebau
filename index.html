function getWarnings(sid){
  const d=S.data[sid];if(!d)return[];const w=[];
  const byDate={};d.blocked.forEach(b=>{const p=b.lastIndexOf('-');const dt=b.substring(0,p);const hr=parseInt(b.substring(p+1));if(!byDate[dt])byDate[dt]=[];byDate[dt].push(hr)});
  Object.entries(byDate).forEach(([dt,hrs])=>{
    if(!isWeekend(dt))return;hrs.sort((a,b)=>a-b);
    let run=1,start=hrs[0];
    for(let i=1;i<hrs.length;i++){if(hrs[i]===hrs[i-1]+1)run++;else{if(run>=5)w.push({type:'weekend',date:dt,from:start,to:start+run,count:run});run=1;start=hrs[i]}}
    if(run>=5)w.push({type:'weekend',date:dt,from:start,to:start+run,count:run});
  });
  const fullDays=Object.values(byDate).filter(hrs=>hrs.length>=14).length;
  const totalBlocked=d.blocked.length;
  if(fullDays>=4||totalBlocked>=56)w.push({type:'toomany',total:totalBlocked,days:fullDays});
  return w;
}

function stuHorarioH(){
  if(!ALUMNO_CLASES.length)return`<div style="text-align:center;color:var(--t3);font-size:13px;padding:12px 0">Todavía no tienes clases asignadas.</div>`;
  const sorted=[...ALUMNO_CLASES].sort((a,b)=>a.fecha<b.fecha?-1:a.fecha>b.fecha?1:a.hora_inicio-b.hora_inicio);
  // Agrupar por semana ISO
  const weeks=[];
  sorted.forEach(c=>{
    const x=new Date(c.fecha+'T12:00:00');
    const wNum=Math.ceil((x-new Date(x.getFullYear(),0,1))/(7*86400000));
    let wk=weeks.find(w=>w.wNum===wNum);
    if(!wk){wk={wNum,clases:[]};weeks.push(wk);}
    wk.clases.push(c);
  });
  let h='';
  weeks.forEach(w=>{
    const byDate={};
    w.clases.forEach(c=>{if(!byDate[c.fecha])byDate[c.fecha]=[];byDate[c.fecha].push(c)});
    const dates=Object.keys(byDate).sort();
    const d1=new Date(dates[0]+'T12:00:00');
    const d2=new Date(dates[dates.length-1]+'T12:00:00');
    h+=`<div style="margin-bottom:16px">
<div style="font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;padding:6px 10px;background:rgba(212,168,83,.08);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--gold)">
📅 Semana del ${d1.getDate()}/${d1.getMonth()+1}${d2!==d1?' al '+d2.getDate()+'/'+(d2.getMonth()+1):''}</div>`;
    dates.forEach(dt=>{
      h+=`<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;padding-left:4px">${fl(dt)}</div>`;
      byDate[dt].forEach(c=>{
        const sub=SJ.find(s=>s.id===c.asignatura_id);
        const insc=c.inscripciones||[];const nStu=insc.length;
        const myInsc=insc.find(i=>i.alumno_id===ALUMNO.id);
        const ph=myInsc?myInsc.precio_hora:(ALUMNO.es_externo?tarifaExt(nStu):tarifa(nStu));
        h+=`<div style="padding:10px 12px;border-radius:10px;background:${sub?.bg||'var(--card2)'};border:1px solid ${sub?.a||'var(--brd)'}20;margin-bottom:5px;display:flex;align-items:center;gap:10px">
<div style="font-size:24px;flex-shrink:0">${sub?.e||'📚'}</div>
<div style="flex:1;min-width:0">
<div style="font-weight:700;font-size:13px;color:${sub?.a||'var(--t)'};margin-bottom:2px">${esc(c.tema)}</div>
<div style="font-size:11px;color:var(--t2)">${hToTime(c.hora_inicio)} · ${fmtDur(c.duracion_horas||2)}</div>
</div>
<div style="text-align:right;flex-shrink:0">
<div style="font-size:11px;font-weight:700;color:var(--gold)">${ph}€/h</div>
<div style="font-size:10px;color:var(--t3)">${nStu} alum.</div>
</div>
</div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  return h;
}

${_horSecH(afternoon,14,22)}

function _horSecH(cls,startH,endH){
  let h='',cursor=startH;
  for(const c of cls){
    const cS=c.hora_inicio,dur=c.duracion_horas||2,cE=cS+dur;
    if(cS>cursor)h+=_freeH(cursor,Math.min(cS,endH));
    h+=_clsCardH(c);
    cursor=Math.max(cursor,cE);
  }
  if(cursor<endH)h+=_freeH(cursor,endH);
  if(!h)h=_freeH(startH,endH);
  return h;
}

function _freeH(from,to){
  if(to<=from)return'';
  return`<div style="padding:3px 5px;border-radius:5px;border:1px dashed var(--brd);margin-bottom:2px;opacity:.45">
<div style="font-size:8px;color:var(--t3)">${hToTime(from)}–${hToTime(to)} libre</div>
</div>`;
}

function renderSP(){
  const el=document.getElementById('sd-pv');if(!el||!ASTU)return;
  const st=AD.alumnos.find(a=>a.id===ASTU);if(!st){el.innerHTML='';return}
  const sc=AD.clases.filter(c=>(c.inscripciones||[]).some(i=>i.alumno_id===ASTU)).sort((a,b)=>a.fecha<b.fecha?-1:a.fecha>b.fecha?1:a.hora_inicio-b.hora_inicio);
  if(!sc.length){el.innerHTML=`<div style="color:var(--t3);font-size:12px;text-align:center;padding:12px">Sin clases asignadas aún</div>`;return}
  const bs={};sc.forEach(c=>{const s=SJ.find(x=>x.id===c.asignatura_id);if(!bs[s?.n||c.asignatura_id])bs[s?.n||c.asignatura_id]=[];bs[s?.n||c.asignatura_id].push(c)});
  let m='';
  if(AMSG_TYPE==='simple'){
    m=`🎓 *REPASOS EBAU - Coco Sapiens*\n\nHola ${st.nombre}, tus clases:\n`;
    Object.entries(bs).forEach(([n,cls])=>{
      m+=`\n📚 *${n}*\n`;
      cls.forEach(c=>{
        const dur=c.duracion_horas||2;
        m+=`  📅 ${fl(c.fecha)} · ${hToTime(c.hora_inicio)} · ${fmtDur(dur)}\n     ${c.tema}\n`;
      });
    });
    m+=`\n⚠️ Horarios firmes. ¿Confirmas? *SÍ* 🙏`;
  } else {
    let total=0;
    m=`🎓 *REPASOS EBAU - Coco Sapiens*\n\nHola ${st.nombre}, tus clases:\n`;
    Object.entries(bs).forEach(([n,cls])=>{
      m+=`\n📚 *${n}*\n`;
      cls.forEach(c=>{
        const insc=c.inscripciones||[];const nStu=insc.length;
        const rate=st.es_externo?tarifaExt(nStu):tarifa(nStu);
        const dur=c.duracion_horas||2;const cost=Math.round(rate*dur*100)/100;total+=cost;
        m+=`  📅 ${fl(c.fecha)} · ${hToTime(c.hora_inicio)} · ${fmtDur(dur)}\n     ${c.tema} (${nStu} alum. → ${rate}€/h)\n     Importe: ${cost}€\n`;
      });
    });
    m+=`\n━━━━━━━━━━━━━━━━━━━━\n💰 *TOTAL: ${total}€*\n\n⚠️ Horarios firmes. ¿Confirmas? *SÍ* 🙏`;
  }
  el.innerHTML=`<div style="background:var(--card);border-radius:10px;padding:10px;border:1px solid var(--brd);margin-bottom:8px;max-height:260px;overflow-y:auto">
<pre style="white-space:pre-wrap;font-size:11px;line-height:1.5;font-family:inherit;color:var(--t2);margin:0">${esc(m)}</pre></div>
<button class="btn" style="margin-bottom:6px" onclick="copyMsg(${JSON.stringify(m).replace(/</g,'\\u003c')})">📋 COPIAR</button>
<button class="btn btn-w" onclick="shareMsg(${JSON.stringify(m).replace(/</g,'\\u003c')})">💬 COMPARTIR</button>`;
}
function copyMsg(m){navigator.clipboard.writeText(m).then(()=>toast('¡Copiado!',true)).catch(()=>{const t=document.createElement('textarea');t.value=m;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();toast('¡Copiado!',true)})}
function shareMsg(m){if(navigator.share)navigator.share({text:m}).catch(()=>{});else copyMsg(m)}

W.addCls=async function(){
  if(!ANC.topic||!ANC.date){toast('Completa asignatura, tema y fecha');return}
  const tInfo=(TP[ANC.sid]||[]).find(t=>t.name===ANC.topic);
  showOv(true,'Creando clase...');
  const {data,error}=await db.from('clases').insert({asignatura_id:ANC.sid,tema:ANC.topic,duracion_horas:tInfo?.dur||2,descanso_min:tInfo?.brk||0,fecha:ANC.date,hora_inicio:ANC.hour,aula:ANC.room}).select().single();
  if(error){showOv(false);toast('Error: '+error.message);return}
  data.inscripciones=[];
  // Add inscriptions for selected students
  const n=ANC.selStudents.length;
  for(const aid of ANC.selStudents){
    const a=AD.alumnos.find(x=>x.id===aid);
    const ph=a?.es_externo?tarifaExt(n):tarifa(n);
    const pt=Math.round(ph*(tInfo?.dur||2)*100)/100;
    const {data:ins}=await db.from('inscripciones').insert({clase_id:data.id,alumno_id:aid,precio_hora:ph,precio_total:pt}).select().single();
    if(ins)data.inscripciones.push(ins);
  }
  AD.clases.push(data);
  ANC={sid:ANC.sid,topic:'',date:ANC.date,hour:ANC.hour,room:ANC.room,selStudents:[]};
  ANEW=false;showOv(false);ADATE=ANC.date||ADATE;toast('✅ Clase creada con '+n+' alumno'+(n>1?'s':''),true);R();
};

W.togCS=async function(cid,aid){
  const c=AD.clases.find(x=>x.id===cid);if(!c)return;
  if(!c.inscripciones)c.inscripciones=[];
  const idx=c.inscripciones.findIndex(i=>i.alumno_id===aid);
  if(idx>=0){
    await db.from('inscripciones').delete().eq('clase_id',cid).eq('alumno_id',aid);
    c.inscripciones.splice(idx,1);
  } else {
    const a=AD.alumnos.find(x=>x.id===aid);
    const nStu=c.inscripciones.length+1;
    const ph=a?.es_externo?tarifaExt(nStu):tarifa(nStu);
    const pt=Math.round(ph*(c.duracion_horas||2)*100)/100;
    const {data}=await db.from('inscripciones').insert({clase_id:cid,alumno_id:aid,precio_hora:ph,precio_total:pt}).select().single();
    if(data)c.inscripciones.push(data);
  }
  // Recalculate prices for all in this class
  const nNew=c.inscripciones.length;
  for(const insc of c.inscripciones){
    const a=AD.alumnos.find(x=>x.id===insc.alumno_id);
    const ph=a?.es_externo?tarifaExt(nNew):tarifa(nNew);
    const pt=Math.round(ph*(c.duracion_horas||2)*100)/100;
    if(insc.precio_hora!==ph){
      await db.from('inscripciones').update({precio_hora:ph,precio_total:pt}).eq('id',insc.id);
      insc.precio_hora=ph;insc.precio_total=pt;
    }
  }
  R();
};
W.autoOrg=async function(){
  const stu=AD.alumnos;if(!stu.length){toast('No hay alumnos');return}
  if(!confirm('¿Reorganizar clases? Se borrarán las que no tengan alumnos asignados y se recalculará todo.'))return;
  showOv(true,'Analizando demanda...');
  // Borrar solo clases sin inscripciones (las auto-generadas vacías)
  const toDel=AD.clases.filter(c=>!(c.inscripciones||[]).length);
  for(const c of toDel)await db.from('clases').delete().eq('id',c.id);
  let res=AD.clases.filter(c=>(c.inscripciones||[]).length>0);
  const failures=[];
  const sorted=[...stu].sort((a,b)=>(a.es_externo?1:0)-(b.es_externo?1:0));
  // Carga por profesor por día (para repartir)
  const dayLd={};
  DT.forEach(d=>dayLd[d]={David:0,Lupe:0});
  res.forEach(c=>{const s=SJ.find(x=>x.id===c.asignatura_id);if(s&&dayLd[c.fecha])dayLd[c.fecha][s.t]=(dayLd[c.fecha][s.t]||0)+1});
  // Construir demanda por tema
  const allT=[];
  for(const sub of SJ){
    const ss=sorted.filter(s=>(s.peticiones||[]).some(p=>p.asignatura_id===sub.id));
    if(!ss.length)continue;
    const dem={};
    ss.forEach(s=>{
      const p=s.peticiones.find(x=>x.asignatura_id===sub.id);if(!p)return;
      (p.temas||[]).forEach(t=>{
        if(!dem[t.name])dem[t.name]={sub,topic:t.name,stus:[],urgDeadline:null,stuMap:{}};
        const d=dem[t.name];
        d.stus.push(s.id);d.stuMap[s.id]=p;
        if(t.urgent&&p.fecha_examen&&(!d.urgDeadline||p.fecha_examen<d.urgDeadline))d.urgDeadline=p.fecha_examen;
      });
    });
    Object.values(dem).forEach(d=>allT.push(d));
  }
  // Ordenar: urgentes primero por fecha límite, luego por demanda
  allT.sort((a,b)=>{
    if(a.urgDeadline&&!b.urgDeadline)return -1;
    if(!a.urgDeadline&&b.urgDeadline)return 1;
    if(a.urgDeadline&&b.urgDeadline&&a.urgDeadline!==b.urgDeadline)return a.urgDeadline<b.urgDeadline?-1:1;
    return b.stus.length-a.stus.length;
  });
  // Helper: fin de semana al que pertenece una fecha
  const wkOf=dt=>{const x=new Date(dt+'T12:00:00');const dw=x.getDay();if(dw===6)return dt;if(dw===0){x.setDate(x.getDate()-1);return x.toISOString().slice(0,10)}return null};
  const dtIdx=dt=>DT.indexOf(dt);
  // Programar cada tema
  showOv(true,'Organizando clases...');
  for(const tDem of allT){
    const{sub,topic,stus,urgDeadline,stuMap}=tDem;
    const tInfo=(TP[sub.id]||[]).find(t=>t.name===topic);
    // Alumnos ya asignados a este tema (desdobles previos o manuales)
    const scheduled=new Set(res.filter(c=>c.asignatura_id===sub.id&&c.tema===topic).flatMap(c=>(c.inscripciones||[]).map(i=>i.alumno_id)));
    let left=stus.filter(s=>!scheduled.has(s));
    if(!left.length)continue;
    const sesDts=[];// fechas de sesiones ya creadas para este tema (para variar fin de semana en desdobles)
    while(left.length>0){
      let best=null,bestSc=-Infinity,bestAv=[];
      for(const dt of DT){
        if(urgDeadline&&dt>urgDeadline)continue;// límite duro: fecha examen
        if((dayLd[dt]||{})[sub.t]>=4)continue;// máx 4 clases/profesor/día para repartir
        for(const hr of HR){
          // Profesor no doblado
          if(res.some(c=>c.fecha===dt&&c.hora_inicio===hr&&SJ.find(s=>s.id===c.asignatura_id)?.t===sub.t))continue;
          // Aula disponible
          const usedRm=res.filter(c=>c.fecha===dt&&c.hora_inicio===hr).map(c=>c.aula);
          const rm=RM.find(r=>!usedRm.includes(r.id));if(!rm)continue;
          // Alumnos disponibles en este hueco
          const av=left.filter(sid=>{
            const p=stuMap[sid];if(!p)return false;
            if((p.horas_bloqueadas||[]).includes(dt+'-'+hr))return false;
            if(res.some(c=>c.fecha===dt&&c.hora_inicio===hr&&(c.inscripciones||[]).some(i=>i.alumno_id===sid)))return false;
            return true;
          });
          if(!av.length)continue;
          // Puntuación del hueco
          let sc=av.length*100;
          sc-=((dayLd[dt]||{})[sub.t]||0)*20;// penalizar día cargado
          // Reparto: urgentes → centro del rango; no urgentes → fechas posteriores (mayo)
          const pos=dtIdx(dt)/DT.length;
          if(urgDeadline){
            let dlI=DT.length-1;for(let i=0;i<DT.length;i++){if(DT[i]>urgDeadline){dlI=i-1;break}}
            const relP=dlI>0?dtIdx(dt)/dlI:0;
            sc-=Math.abs(relP-0.5)*15;// preferir centro del rango disponible
          } else {
            sc+=pos*25;// preferir fechas de mayo para no urgentes
          }
          // Variedad de fin de semana para desdobles
          const wk=wkOf(dt);
          if(wk&&sesDts.some(d=>wkOf(d)===wk))sc-=40;
          // Penalizar si el alumno ya tiene muchas clases ese día
          av.forEach(sid=>{sc-=res.filter(c=>c.fecha===dt&&(c.inscripciones||[]).some(i=>i.alumno_id===sid)).length*8});
          if(sc>bestSc){bestSc=sc;best={dt,hr,rm};bestAv=av}
        }
      }
      if(!best){
        failures.push({sub:sub.n,topic,reason:urgDeadline?'Sin hueco antes del '+fd(urgDeadline):'Sin hueco disponible en el calendario',alumnos:left.map(s=>{const a=sorted.find(x=>x.id===s);return a?a.nombre+' '+a.apellidos:'?'}).join(', ')});
        break;
      }
      // Crear clase con hasta el aforo de la aula (desdoble automático si quedan más)
      const stuToAdd=bestAv.slice(0,best.rm.c);
      const{data:cls}=await db.from('clases').insert({asignatura_id:sub.id,tema:topic,duracion_horas:tInfo?.dur||2,descanso_min:tInfo?.brk||0,fecha:best.dt,hora_inicio:best.hr,aula:best.rm.id}).select().single();
      if(!cls)break;
      cls.inscripciones=[];
      const nStu=stuToAdd.length;
      for(const sid of stuToAdd){
        const a=sorted.find(x=>x.id===sid);
        const ph=a?.es_externo?tarifaExt(nStu):tarifa(nStu);
        const pt=Math.round(ph*(tInfo?.dur||2)*100)/100;
        const{data:insc}=await db.from('inscripciones').insert({clase_id:cls.id,alumno_id:sid,precio_hora:ph,precio_total:pt}).select().single();
        if(insc)cls.inscripciones.push(insc);
      }
      res.push(cls);
      sesDts.push(best.dt);
      dayLd[best.dt][sub.t]=(dayLd[best.dt][sub.t]||0)+1;
      left=left.filter(s=>!stuToAdd.includes(s));
    }
  }
  AD.clases=res;AORG_FAILURES=[...failures];
  showOv(false);
  const sinColocar=failures.length?' · ⚠️ '+failures.length+' temas sin colocar':'';
  toast('✅ '+res.length+' clases'+sinColocar,!failures.length);
  R();
};
W.delDay=async function(dt){
  const n=AD.clases.filter(c=>c.fecha===dt).length;
  if(!n){toast('Sin clases ese día');return}
  if(!confirm('¿Borrar las '+n+' clases del '+fl(dt)+'?\nLos datos de alumnos NO se eliminan.'))return;
  showOv(true,'Borrando...');
  for(const c of AD.clases.filter(x=>x.fecha===dt))await db.from('clases').delete().eq('id',c.id);
  AD.clases=AD.clases.filter(c=>c.fecha!==dt);
  showOv(false);toast('Día borrado');R();
};
W.delAll=async function(){

  if(!confirm('¿Borrar TODA la organización? ('+AD.clases.length+' clases)\nLos datos de alumnos NO se eliminan.'))return;
  showOv(true,'Borrando todo...');
  for(const c of AD.clases)await db.from('clases').delete().eq('id',c.id);

};
W.ncSub=function(id){ANC.sid=id;ANC.topic='';ANC.selStudents=[];R()};
W.ncTop=function(val){
  ANC.topic=val;
  ANC.selStudents=[];
  if(val&&ANC.date){
    const tInfo=(TP[ANC.sid]||[]).find(t=>t.name===val);
    const newDur=tInfo?.dur||2;
    const stuPed=AD.alumnos.filter(a=>(a.peticiones||[]).some(p=>p.asignatura_id===ANC.sid&&(p.temas||[]).some(t=>(typeof t==='string'?t:t.name)===val)));
    stuPed.forEach(a=>{
      const ped=a.peticiones.find(p=>p.asignatura_id===ANC.sid);
      const inThis=AD.clases.some(c=>c.asignatura_id===ANC.sid&&c.tema===val&&(c.inscripciones||[]).some(i=>i.alumno_id===a.id));
      const blocked=(ped?.horas_bloqueadas||[]).some(k=>{const p=k.split('-');const kh=parseInt(p[p.length-1]);const kd=p.slice(0,-1).join('-');return kd===ANC.date&&kh>=Math.floor(ANC.hour)&&kh<Math.ceil(ANC.hour+newDur);});
      const clash=AD.clases.some(c=>c.fecha===ANC.date&&(c.inscripciones||[]).some(i=>i.alumno_id===a.id)&&overlapsRange(ANC.hour,newDur,c.hora_inicio,c.duracion_horas||2));
      if(!inThis&&!blocked&&!clash)ANC.selStudents.push(a.id);

};
W.togNCStu=function(id){
  const idx=ANC.selStudents.indexOf(id);
  if(idx>=0)ANC.selStudents.splice(idx,1);else ANC.selStudents.push(id);
  W.ncCheck();
};
W.ncAddExtra=function(id){if(id&&!ANC.selStudents.includes(id)){ANC.selStudents.push(id);W.ncCheck()}};
W.ncCheck=function(){
  const el=document.getElementById('nc-stu');if(!el)return;
  if(!ANC.topic||!ANC.date){el.innerHTML='<div style="font-size:12px;color:var(--t3);padding:8px 0;text-align:center">Selecciona tema y fecha para ver alumnos</div>';return}
  const sub=SJ.find(s=>s.id===ANC.sid);
  const tInfo=(TP[ANC.sid]||[]).find(t=>t.name===ANC.topic);
  const newDur=tInfo?.dur||2;
  const stuPed=AD.alumnos.filter(a=>(a.peticiones||[]).some(p=>p.asignatura_id===ANC.sid&&(p.temas||[]).some(t=>(typeof t==='string'?t:t.name)===ANC.topic)));
  const CL={skip:'podría venir',impossible:'IMPOSIBLE faltar',depends:'depende'};
  // Evaluate each student
  function stuStatus(a){
    const ped=a.peticiones.find(p=>p.asignatura_id===ANC.sid);
    const inThis=AD.clases.some(c=>c.asignatura_id===ANC.sid&&c.tema===ANC.topic&&(c.inscripciones||[]).some(i=>i.alumno_id===a.id));
    const blocked=(ped?.horas_bloqueadas||[]).some(k=>{const p=k.split('-');const kh=parseInt(p[p.length-1]);const kd=p.slice(0,-1).join('-');return kd===ANC.date&&kh>=Math.floor(ANC.hour)&&kh<Math.ceil(ANC.hour+newDur);});
    const clash=AD.clases.some(c=>c.fecha===ANC.date&&(c.inscripciones||[]).some(i=>i.alumno_id===a.id)&&overlapsRange(ANC.hour,newDur,c.hora_inicio,c.duracion_horas||2));
    const sameDay=!clash&&AD.clases.some(c=>c.fecha===ANC.date&&(c.inscripciones||[]).some(i=>i.alumno_id===a.id));
    let evInfo=null;
    if(blocked&&ped){try{const nb=JSON.parse(ped.nota_bloqueo||'');if(nb.v&&nb.eventos){const ev=nb.eventos.filter(e=>e.activo&&e.rangos.length).find(e=>e.rangos.some(r=>{const d1=new Date(r.fi+'T12:00:00'),d2=r.ff?new Date(r.ff+'T12:00:00'):d1,td=new Date(ANC.date+'T12:00:00');return td>=d1&&td<=d2&&ANC.hour>=r.hd&&ANC.hour<r.hh;}));if(ev)evInfo=ev;}}catch(e){}}
    return{inThis,blocked,clash,sameDay,evInfo};
  }
  // Warnings for selected students
  const warnings=ANC.selStudents.map(id=>{
    const a=AD.alumnos.find(x=>x.id===id);if(!a)return null;
    const st=stuStatus(a);
    if(st.clash)return`⚠️ ${esc(a.nombre)}: solape con otra clase (${hToTime(ANC.hour)}–${hToTime(ANC.hour+newDur)})`;
    if(st.blocked&&st.evInfo){const c=st.evInfo.compromiso;return`${st.evInfo.ico} ${esc(a.nombre)}: ${st.evInfo.id}${c==='impossible'?' — IMPOSIBLE faltar':c==='depends'?' — depende del repaso':''}`;}
    if(st.blocked)return`🔴 ${esc(a.nombre)}: ha bloqueado esa franja horaria`;
    return null;
  }).filter(Boolean);
  const warnHtml=warnings.length?`<div style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:8px;margin-bottom:8px">${warnings.map(w=>`<div style="font-size:10px;color:var(--warn);margin-bottom:2px">${w}</div>`).join('')}<div style="font-size:9px;color:var(--t3);margin-top:4px">La clase se creará igualmente</div></div>`:'';
  // Student cards
  const cardsHtml=stuPed.length?`<div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px;margin-bottom:6px">PIDIERON ESTE TEMA</div>`+stuPed.map(a=>{
    const sel=ANC.selStudents.includes(a.id);
    const st=stuStatus(a);
    // inThis = already covered in another session → disabled, non-clickable
    if(st.inThis){return`<div style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;border:1px solid var(--brd);background:transparent;margin-bottom:4px;opacity:.45">
<div style="display:flex;align-items:center;gap:8px">
<div style="width:20px;height:20px;border-radius:5px;border:2px solid var(--t3);background:var(--t3);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:#000">✓</div>
<span style="font-size:13px;color:var(--t3)">${esc(a.nombre)} ${esc(a.apellidos)}</span>
</div>
<span style="font-size:10px;color:var(--t3)">ya tiene este tema</span></div>`;}
    let tag='',tagCol='var(--t3)';
    if(st.clash){tag='⚠️ solape';tagCol='var(--red)'}
    else if(st.blocked&&st.evInfo){const c=st.evInfo.compromiso;const cc=c==='impossible'?'var(--red)':c==='skip'?'var(--grn)':'var(--warn)';tag=`${st.evInfo.ico} ${st.evInfo.id}`;tagCol=cc}
    else if(st.blocked){tag='bloqueado';tagCol='var(--red)'}
    else if(st.sameDay){tag='otro repaso hoy';tagCol='var(--warn)'}
    else{tag='✅ disponible';tagCol='var(--grn)'}
    return`<button onclick="W.togNCStu('${a.id}')" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;border:2px solid ${sel?sub?.a||'var(--gold)':'var(--brd)'};background:${sel?(sub?.bg||'rgba(212,168,83,.08)'):'var(--card2)'};cursor:pointer;font-family:inherit;margin-bottom:4px;transition:all .15s">
<div style="display:flex;align-items:center;gap:8px">
<div style="width:20px;height:20px;border-radius:5px;border:2px solid ${sel?sub?.a||'var(--gold)':'var(--brd)'};background:${sel?sub?.a||'var(--gold)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:#000">${sel?'✓':''}</div>
<span style="font-size:13px;font-weight:${sel?600:400};color:var(--t)">${esc(a.nombre)} ${esc(a.apellidos)}${a.es_externo?'<span style="font-size:9px;color:var(--warn);margin-left:4px">ext</span>':''}</span>
</div>
<span style="font-size:10px;color:${tagCol}">${tag}</span></button>`;
  }).join(''):'<div style="font-size:12px;color:var(--t3);padding:6px 0">Ningún alumno ha pedido este tema</div>';
  // Extra students
  const shownIds=new Set(stuPed.map(a=>a.id));
  const extras=AD.alumnos.filter(a=>!shownIds.has(a.id));
  const extraHtml=extras.length?`<div style="margin-top:10px"><div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px;margin-bottom:6px">AÑADIR OTRO ALUMNO</div>
<select class="inp" id="nc-extra" style="font-size:12px" onchange="W.ncAddExtra(this.value);this.value=''">
<option value="">+ Añadir alumno registrado...</option>
${extras.filter(a=>!ANC.selStudents.includes(a.id)).map(a=>`<option value="${a.id}">${esc(a.nombre)} ${esc(a.apellidos)}</option>`).join('')}
</select></div>`:'';
  const n=ANC.selStudents.length;const rate=n>=2?tarifa(n):null;const total=rate&&tInfo?Math.round(rate*tInfo.dur*100)/100:null;
  const btnEl=document.querySelector('.btn-create-cls');
  if(btnEl){btnEl.style.background=n>=1?'linear-gradient(135deg,var(--gold),#c4943d)':'var(--card2)';btnEl.style.color=n>=1?'#000':'var(--t3)';btnEl.style.pointerEvents=n>=1?'auto':'none';btnEl.textContent=n>=1?`✅ Crear clase · ${n} alumno${n>1?'s':''} · ${rate?rate+'€/h':'(sin precio aún)'}${total?' · '+total+'€/alumno':''}`:n===0?'Selecciona al menos 1 alumno':'Elige tema y fecha primero';}
  el.innerHTML=warnHtml+cardsHtml+extraHtml;
};

      if(newBuf.length===4){
        if(!isConf){REG.step='pin2';setTimeout(()=>R(),200)}

          else{document.getElementById('pin-err').textContent='Los PINs no coinciden. Inténtalo de nuevo.';REG.pinBuf='';REG.pinBuf2='';REG.step='pin';setTimeout(()=>R(),1200)}
        }
      }
    }));
    document.getElementById('pin-del')?.addEventListener('click',()=>{
      const isConf=REG.step==='pin2';
      if(isConf)REG.pinBuf2=REG.pinBuf2.slice(0,-1);else REG.pinBuf=REG.pinBuf.slice(0,-1);
      const buf=isConf?REG.pinBuf2:REG.pinBuf;
      document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',buf.length>i));
    });
  }

  // Login PIN
  if(V==='login-pin'){
    document.querySelectorAll('.pin-key[data-n]').forEach(k=>k.addEventListener('click',()=>{
      if(LG.pinBuf.length>=4)return;
      LG.pinBuf+=k.dataset.n;
      document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<LG.pinBuf.length));
      if(LG.pinBuf.length===4)doLogin();
    }));
    document.getElementById('pin-del')?.addEventListener('click',()=>{LG.pinBuf=LG.pinBuf.slice(0,-1);document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<LG.pinBuf.length))});
  }

  // Back universal
  document.getElementById('back')?.addEventListener('click',()=>{
    if(V==='reg'){
      if(REG.step==='datos')go('splash');
      else if(REG.step==='config'){REG.step='datos';R()}
      else if(REG.step==='pin'){REG.step='config';R()}
      else if(REG.step==='pin2'){REG.step='pin';REG.pinBuf='';REG.pinBuf2='';R()}
    } else if(V==='stu-edit'){go('stu-home')}

      if(S.editMode==='disp'){
        if(S.evCur>0){S.evCur--;R();window.scrollTo(0,0)}
        else go('stu-edit');
      } else if(S.step===0){S.editMode?go('stu-edit'):go('splash')}

      else{S.step--;R();window.scrollTo(0,0)}
    } else if(V==='fin'){S.step=S.subs.length;go('wizard')}
    else if(V==='login')go('splash');
    else if(V==='login-pin')go('login');
    else go('splash');

  document.getElementById('next')?.addEventListener('click',()=>{
    if(V==='reg'){
      if(REG.step==='datos'){REG.step='config';R();window.scrollTo(0,0)}
      else if(REG.step==='config'){REG.step='pin';REG.pinBuf='';R();window.scrollTo(0,0)}
    } else if(V==='login'){go('login-pin')}
    else if(V==='wizard'){

        if(S.editMode==='subs'){genMsg();S.step=999;R();window.scrollTo(0,0)}

      } else {
        S.step++;R();window.scrollTo(0,0)
      }

  // Eventos wizard
  document.getElementById('ev-add-btn')?.addEventListener('click',W.evAddR);

  document.getElementById('l-nombre')?.addEventListener('input',function(){LG.nombre=this.value;document.getElementById('next').disabled=!(LG.nombre.trim()&&LG.apellidos.trim())});
  document.getElementById('l-apellidos')?.addEventListener('input',function(){LG.apellidos=this.value;document.getElementById('next').disabled=!(LG.nombre.trim()&&LG.apellidos.trim())});

  document.getElementById('btn-save-disp')?.addEventListener('click',saveDisp);
  document.getElementById('btn-share')?.addEventListener('click',()=>{if(navigator.share)navigator.share({text:S.msg}).catch(()=>{});else copyMsg(S.msg)});

  document.getElementById('adm-enter')?.addEventListener('click',doAdminLogin);
  document.getElementById('adm-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin()});

  document.querySelectorAll('.col-manual-btn').forEach(b=>b.addEventListener('click',()=>{

    ANC.sid=sid;ANC.topic=top;ANC.selStudents=[];AT='horarios';ANEW=true;R();
    setTimeout(()=>W.ncTop(top),100);
  }));

  // Admin search
  document.getElementById('s-search')?.addEventListener('input',function(){ASRCH=this.value;R()});

  // Admin new class
  document.getElementById('nc-top')?.addEventListener('change',function(){W.ncTop(this.value)});

  document.getElementById('sd-stu')?.addEventListener('change',function(){ASTU=this.value;renderSP()});

  // Wizard: subjects

    document.querySelectorAll('.tab[data-tab]').forEach(t=>t.addEventListener('click',()=>{S.tabs[sid]=t.dataset.tab;R()}));
  }

function genMsg(){
  let m=`🎓 REPASOS EBAU · COCO SAPIENS\n━━━━━━━━━━━━━━━━━━━━\n👤 ${REG.nombre} ${REG.apellidos}\n`;
  if(REG.telefono)m+=`📱 ${REG.telefono}\n`;
  m+=`🏫 ${REG.centro}\n`;
  m+=`🎓 ${REG.esExterno?'Alumno externo':'Alumno del curso'}\n`;
  m+=`📋 Preferencia: ${REG.prefConcentrar?'Clases concentradas':'Clases repartidas'}\n`;
  S.subs.forEach(sid=>{
    const sub=SJ.find(s=>s.id===sid);const d=S.data[sid];
    m+=`\n📚 ${sub.n.toUpperCase()}\n🎯 EBAU: ${d.ebau?'SÍ':'NO'}\n`;
    const f=d.finalDate?new Date(d.finalDate+'T12:00:00'):null;
    m+=`📅 Final: ${f?f.getDate()+'/'+(f.getMonth()+1)+'/'+f.getFullYear():'??'}${d.estimated?' (estimada)'+(d.weekHint?' → '+d.weekHint:''):''}\n📋 Temas:\n`;
    d.topics.forEach((t,i)=>{const info=(TP[sid]||[]).find(x=>x.name===t.name);m+=`  ${i+1}. ${t.name}${info?' ('+fmtDur(info.dur)+')':''}${t.urgent?' 🔥':''}\n`});
    if(d.blocked.length){
      m+=`🚫 No puedo:\n`;
      const byDate={};d.blocked.forEach(b=>{const p=b.lastIndexOf('-');const dt=b.substring(0,p);const hr=parseInt(b.substring(p+1));if(!byDate[dt])byDate[dt]=[];byDate[dt].push(hr)});
      Object.keys(byDate).sort().forEach(k=>{const hrs=byDate[k].sort((a,b)=>a-b);const groups=[];let start=hrs[0],prev=hrs[0];for(let i=1;i<hrs.length;i++){if(hrs[i]===prev+1)prev=hrs[i];else{groups.push([start,prev+1]);start=hrs[i];prev=hrs[i]}}groups.push([start,prev+1]);groups.forEach(([s,e])=>{m+=`  ${fd(k)} ${s}:00-${e}:00\n`})});
      if(d.blockNote)m+=`  📝 ${d.blockNote}\n`;
    } else m+=`✅ Disponibilidad total\n`;
  });
  const CL={skip:'podría no ir al evento',impossible:'imposible faltar',depends:'depende del repaso'};
  const evAct=(S.eventos||[]).filter(e=>e.activo&&e.rangos.length);
  if(evAct.length){
    m+=`\n📅 DISPONIBILIDAD\n`;
    evAct.forEach(e=>{
      m+=`${e.ico} ${e.id.charAt(0).toUpperCase()+e.id.slice(1)}:\n`;
      e.rangos.forEach(r=>{const d1=new Date(r.fi+'T12:00:00');const d2=r.ff&&r.ff!==r.fi?new Date(r.ff+'T12:00:00'):null;m+=`  📅 ${d1.getDate()}/${d1.getMonth()+1}${d2?' → '+d2.getDate()+'/'+(d2.getMonth()+1):''} · ${r.hd}h–${r.hh}h\n`});
      if(e.compromiso)m+=`  → Si coincide con repaso: ${CL[e.compromiso]||e.compromiso}\n`;
    });
  } else {
    m+=`\n📅 DISPONIBILIDAD: Sin eventos programados\n`;
  }
  m+=`\n✅ ACEPTO las condiciones\n━━━━━━━━━━━━━━━━━━━━`;
  S.msg=m;
}

async function saveToSupabase(){
  showOv(true,'Guardando tu petición...');
  try{
    // Check if alumno already exists
    const {data:existing}=await db.from('alumnos').select('id').eq('nombre',REG.nombre).eq('apellidos',REG.apellidos).maybeSingle();
    let alumnoId;
    if(existing){
      alumnoId=existing.id;
      await db.from('alumnos').update({telefono:REG.telefono,centro:REG.centro,es_externo:REG.esExterno,prefiere_concentrar:REG.prefConcentrar,pin:REG.pin}).eq('id',alumnoId);
    } else {
      const {data:newA,error:errA}=await db.from('alumnos').insert({nombre:REG.nombre,apellidos:REG.apellidos,telefono:REG.telefono,centro:REG.centro,es_externo:REG.esExterno,prefiere_concentrar:REG.prefConcentrar,pin:REG.pin}).select().single();
      if(errA)throw errA;
      alumnoId=newA.id;
    }
    // Delete old peticiones and insert new
    await db.from('peticiones').delete().eq('alumno_id',alumnoId);
    // If editing only subjects, preserve existing availability data
    let blkH,notaBloqueo0;
    if(S.editMode==='subs'&&ALUMNO){
      const oldPed=(ALUMNO.peticiones||[])[0];
      blkH=oldPed?.horas_bloqueadas||[];
      notaBloqueo0=oldPed?.nota_bloqueo||null;
    } else {
      blkH=eventoToBlocked(S.eventos);
      notaBloqueo0=JSON.stringify({v:1,eventos:S.eventos});
    }
    let evIdx=0;
    for(const sid of S.subs){
      const d=S.data[sid];
      const nota=evIdx===0?notaBloqueo0:null;
      await db.from('peticiones').insert({alumno_id:alumnoId,asignatura_id:sid,temas:d.topics,horas_bloqueadas:blkH,fecha_examen:d.finalDate||null,es_ebau:d.ebau,fecha_estimada:d.estimated,semana_hint:d.weekHint||null,nota_bloqueo:nota});
      evIdx++;
    }
    showOv(false);
    toast('✅ Petición guardada',true);
  } catch(e){
    showOv(false);
    toast('Error al guardar: '+e.message);
  }
}

function _cargarDatosAlumno(){
  const peds=ALUMNO.peticiones||[];
  let evCargados=mkEventos();
  if(peds[0]?.nota_bloqueo){try{const p=JSON.parse(peds[0].nota_bloqueo);if(p.v&&p.eventos)evCargados=p.eventos;}catch(e){}}
  S.subs=[];S.data={};S.tabs={};S.openDay={};S.eventos=evCargados;S.accepted=false;S.msg='';S.evCur=0;
  peds.forEach(p=>{
    S.subs.push(p.asignatura_id);
    S.data[p.asignatura_id]={ebau:p.es_ebau,finalDate:p.fecha_examen||'',estimated:p.fecha_estimada,weekHint:p.semana_hint||'',topics:p.temas||[],blocked:p.horas_bloqueadas||[],blockNote:''};
    S.tabs[p.asignatura_id]='topics';S.openDay[p.asignatura_id]=null;
  });
  REG.nombre=ALUMNO.nombre;REG.apellidos=ALUMNO.apellidos;REG.telefono=ALUMNO.telefono||'';REG.centro=ALUMNO.centro||'';REG.esExterno=ALUMNO.es_externo;REG.prefConcentrar=ALUMNO.prefiere_concentrar;REG.pin=ALUMNO.pin;
}
function editarPeticion(){
  S={step:0,subs:[],data:{},tabs:{},openDay:{},accepted:false,msg:'',evCur:0,eventos:mkEventos(),editMode:null};
  _cargarDatosAlumno();
  go('wizard');
}
W.editSubs=function(){
  S={step:0,subs:[],data:{},tabs:{},openDay:{},accepted:false,msg:'',evCur:0,eventos:mkEventos(),editMode:'subs'};
  _cargarDatosAlumno();
  go('wizard');
};
W.editDisp=function(){
  S={step:0,subs:[],data:{},tabs:{},openDay:{},accepted:false,msg:'',evCur:0,eventos:mkEventos(),editMode:'disp'};
  _cargarDatosAlumno();
  go('wizard');
};
function finDispH(){
  const evAct=(S.eventos||[]).filter(e=>e.activo&&e.rangos.length);
  const CL={skip:'podría no ir al evento',impossible:'imposible faltar',depends:'depende del repaso'};
  return`<div class="c" style="min-height:100dvh;padding-bottom:100px"><div class="hdr"><button id="back">← Atrás</button><span>Confirmar disponibilidad</span></div>
<div class="fu" style="padding-top:16px">
<div style="text-align:center;margin-bottom:20px">
<div style="font-size:44px;margin-bottom:8px">📅</div>
<h2 style="font-family:'Playfair Display',serif;font-size:22px;color:var(--gold2);margin-bottom:4px">Tu disponibilidad</h2>
<p style="font-size:13px;color:var(--t2)">${evAct.length?evAct.length+' evento(s) registrado(s)':'Sin eventos — disponibilidad total'}</p>
</div>
${evAct.length?evAct.map(e=>`<div style="padding:14px;border-radius:12px;border:1px solid var(--brd);background:var(--card);margin-bottom:10px">
<div style="font-size:15px;font-weight:600;margin-bottom:8px">${e.ico} ${e.id.charAt(0).toUpperCase()+e.id.slice(1)}</div>
${e.rangos.map(r=>{const d1=new Date(r.fi+'T12:00:00');const d2=r.ff&&r.ff!==r.fi?new Date(r.ff+'T12:00:00'):null;return`<div style="font-size:12px;color:var(--t2);margin-bottom:3px">📅 ${d1.getDate()}/${d1.getMonth()+1}${d2?' → '+d2.getDate()+'/'+(d2.getMonth()+1):''} · ${r.hd}h–${r.hh}h</div>`}).join('')}
${e.compromiso?`<div style="font-size:12px;color:var(--warn);margin-top:6px">→ ${CL[e.compromiso]}</div>`:''}
</div>`).join(''):`<div style="text-align:center;padding:24px;color:var(--t3);font-size:14px">✅ Sin incompatibilidades registradas</div>`}
</div>
<div class="ftr"><div class="c"><button class="btn" id="btn-save-disp">GUARDAR MI DISPONIBILIDAD ✓</button></div></div>`;
}
async function saveDisp(){
  showOv(true,'Guardando disponibilidad...');
  try{
    const blkH=eventoToBlocked(S.eventos);
    const nota=JSON.stringify({v:1,eventos:S.eventos});
    const alumnoId=ALUMNO.id;
    const peds=ALUMNO.peticiones||[];
    for(let i=0;i<peds.length;i++){
      const notaVal=i===0?nota:null;
      await db.from('peticiones').update({horas_bloqueadas:blkH,nota_bloqueo:notaVal}).eq('id',peds[i].id);
    }
    // Reload alumno data
    const {data}=await db.from('alumnos').select('*, peticiones(*)').eq('id',alumnoId).single();
    if(data)ALUMNO=data;
    showOv(false);
    toast('✅ Disponibilidad guardada',true);
    go('stu-home');
  } catch(e){
    showOv(false);
    toast('Error al guardar: '+e.message);
  }
}

// ═══ SUPABASE OPS ═══
async function doLogin(){
  showOv(true,'Verificando...');
  const {data,error}=await db.from('alumnos').select('*, peticiones(*)').eq('nombre',LG.nombre).eq('apellidos',LG.apellidos).eq('pin',LG.pinBuf).maybeSingle();
  if(error||!data){
    showOv(false);
    document.getElementById('pin-err').textContent='PIN incorrecto o datos no encontrados';
    LG.pinBuf='';
    document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('filled'));
    return;
  }
  ALUMNO=data;
  // Load classes and config for this student
  const [inscRes,cfgRes]=await Promise.all([
    db.from('inscripciones').select('clase_id').eq('alumno_id',ALUMNO.id),
    db.from('config').select('*').eq('clave','horarios_visibles').maybeSingle()
  ]);
  const claseIds=inscRes.data?.map(i=>i.clase_id)||[];
  const {data:clases}=claseIds.length?await db.from('clases').select('*, inscripciones(*)').in('id',claseIds):{data:[]};
  ALUMNO_CLASES=clases||[];
  STU_HORARIOS_VIS=cfgRes.data?.valor==='true';
  showOv(false);go('stu-home');
}

async function doAdminLogin(){
  const pass=document.getElementById('adm-pass')?.value;
  if(pass!==ADMIN_PASS){document.getElementById('adm-err').textContent='Contraseña incorrecta';return}
  showOv(true,'Cargando datos...');
  await loadAdminData();
  ADMIN=true;showOv(false);AT='alumnos';go('admin');
}

async function loadAdminData(){
  const [r1,r2,r3]=await Promise.all([
    db.from('alumnos').select('*, peticiones(*)').order('apellidos'),
    db.from('clases').select('*, inscripciones(*)').order('fecha').order('hora_inicio'),
    db.from('config').select('*')
  ]);
  AD.alumnos=r1.data||[];
  AD.clases=r2.data||[];
  AD.config={};(r3.data||[]).forEach(c=>AD.config[c.clave]=c.valor);
}

// ═══ BACK BUTTON MÓVIL ═══
window.addEventListener('popstate',function(){
  if(V==='splash'){history.pushState({v:'splash'},'','');return}
  if(V==='reg'){
    if(REG.step==='datos')V='splash';
    else if(REG.step==='config')REG.step='datos';
    else if(REG.step==='pin')REG.step='config';
    else if(REG.step==='pin2'){REG.step='pin';REG.pinBuf='';REG.pinBuf2='';}
  } else if(V==='wizard'){
    if(S.step===0)V='splash';else S.step--;
  } else if(V==='fin'){
    S.step=S.subs.length;V='wizard';
  } else if(V==='login-pin'){
    LG.pinBuf='';V='login';
  } else if(V==='stu-home'){
    ALUMNO=null;ALUMNO_CLASES=[];V='splash';
  } else if(V==='admin'){
    ADMIN=false;AD={alumnos:[],clases:[],config:{}};V='splash';
  } else {
    V='splash';
  }
  R();window.scrollTo(0,0);
});

// ═══ INIT ═══
history.replaceState({v:'splash'},'','');
R();
